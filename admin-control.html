<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم الإدارة | تصفية الحسابات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; font-family: 'Cairo', sans-serif; }
        .admin-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-8">

<div class="max-w-6xl mx-auto">
    <h1 class="text-3xl font-black text-blue-400 mb-8 italic">إدارة مديونيات المسوقين</h1>
    
    <div class="overflow-x-auto shadow-2xl rounded-[30px]">
        <table class="w-full text-right admin-card">
            <thead class="bg-blue-600/20 text-blue-400 text-xs uppercase">
                <tr>
                    <th class="p-5">المسوق</th>
                    <th class="p-5">رقم الموبايل / الدفع</th>
                    <th class="p-5 text-red-400">المديونية الحالية</th>
                    <th class="p-5">الإجراء</th>
                </tr>
            </thead>
            <tbody id="adminUsersList" class="divide-y divide-white/5">
                </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { /* ضع إعداداتك هنا */ };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const listContainer = document.getElementById('adminUsersList');

    // تحميل قائمة المستخدمين
    onValue(ref(db, 'users'), (snapshot) => {
        listContainer.innerHTML = '';
        const users = snapshot.val();

        for (let id in users) {
            const user = users[id];
            // نظهر فقط المسوقين الذين لديهم مديونية
            if (user.role === 'marketer' || user.role === 'admin') {
                const debt = (user.wallet && user.wallet.debt) ? user.wallet.debt : 0;
                const payInfo = user.paymentMethods ? Object.values(user.paymentMethods).join(' | ') : 'لا يوجد أرقام';

                listContainer.innerHTML += `
                    <tr class="hover:bg-white/5 transition">
                        <td class="p-5">
                            <p class="font-bold">${user.name}</p>
                            <p class="text-[10px] text-gray-500">${user.email}</p>
                        </td>
                        <td class="p-5 text-xs text-gray-400">${payInfo}</td>
                        <td class="p-5 font-black text-red-500">${debt} ج.م</td>
                        <td class="p-5">
                            <button onclick="clearDebt('${id}')" class="bg-green-600/20 text-green-500 px-4 py-2 rounded-xl text-[10px] font-black hover:bg-green-600 hover:text-white transition">تم التحصيل (تصفير)</button>
                        </td>
                    </tr>
                `;
            }
        }
    });

    // وظيفة تصفير المديونية
    window.clearDebt = async (userId) => {
        if(confirm("هل تأكدت من استلام المبلغ وتريد تصفير مديونية هذا المسوق؟")) {
            await update(ref(db, `users/${userId}/wallet`), { debt: 0 });
            alert("تم تصفير المديونية بنجاح!");
        }
    };
</script>
</body>
</html>
