<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js">
    <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js">
    <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الإدارة | تصفية الحسابات</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="p-8 relative z-10">

<div class="max-w-6xl mx-auto animate-slide">
    <div class="flex justify-between items-center mb-8 border-b border-white/10 pb-6">
        <div>
            <h1 class="text-3xl font-black text-blue-400 italic drop-shadow-md">إدارة ديون التجار</h1>
            <p class="text-xs text-gray-400 mt-2 font-bold uppercase tracking-widest">تصفية مستحقات المنصة (10%)</p>
        </div>
        <a href="profile.html" class="bg-white/5 hover:bg-white/10 text-white px-5 py-2.5 rounded-xl text-xs font-black transition-colors border border-white/10 shadow-lg">← العودة للبروفايل</a>
    </div>
    
    <div class="glass overflow-x-auto shadow-[0_0_40px_rgba(59,130,246,0.15)] rounded-[35px] border border-blue-500/20 no-scrollbar">
        <table class="w-full text-right admin-card min-w-[600px]">
            <thead class="bg-blue-600/20 text-blue-400 text-[11px] uppercase tracking-widest">
                <tr>
                    <th class="p-6 rounded-tr-[35px]">التاجر</th>
                    <th class="p-6">رقم الموبايل / وسائل الدفع</th>
                    <th class="p-6 text-red-400">المديونية الحالية</th>
                    <th class="p-6 rounded-tl-[35px]">الإجراء</th>
                </tr>
            </thead>
            <tbody id="adminUsersList" class="divide-y divide-white/5">
                <tr>
                    <td colspan="4" class="text-center p-10 text-gray-500 text-sm italic">جاري تحميل بيانات التجار... ⏳</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<div id="toast" class="fixed bottom-10 right-10 glass px-8 py-4 rounded-2xl text-white font-black opacity-0 transition-all pointer-events-none z-[500] border-blue-500/50 border text-[10px] uppercase tracking-widest text-center shadow-2xl"></div>

<script src="https://cdn.tailwindcss.com"></script>
<script type="module" src="js/admin-control.js"></script>

</body>
</html>
