<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js">
    <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js">
    <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحفظة المالية | Start Online</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/wallet.css">
</head>
<body class="p-4 md:p-10 relative z-10">

    <div class="max-w-4xl mx-auto space-y-8 animate-slide">
        <div class="flex items-center gap-4 border-b border-white/10 pb-6">
            <a href="profile.html" class="text-blue-400 hover:text-white bg-white/5 px-4 py-2 rounded-xl text-xs font-bold transition-colors">← العودة لحسابي</a>
            <h1 class="text-3xl font-black text-white italic m-0">💰 المحفظة المالية</h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="card-grad p-8 rounded-[35px] shadow-2xl relative overflow-hidden transition-transform hover:scale-105 duration-300">
                <div class="absolute top-0 left-0 w-24 h-24 bg-blue-500/10 blur-3xl rounded-full pointer-events-none"></div>
                <p class="text-xs text-gray-400 font-bold uppercase mb-2">أرباحك الحالية</p>
                <h2 id="userBalance" class="text-5xl font-black text-white tracking-tighter drop-shadow-md">0 <span class="text-sm">ج.م</span></h2>
                <p class="text-[10px] text-green-400 mt-4 font-bold flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse inline-block"></span> جاهزة للسحب
                </p>
            </div>

            <div class="card-grad p-8 rounded-[35px] border-red-500/20 relative overflow-hidden transition-transform hover:scale-105 duration-300">
                <div class="absolute top-0 right-0 w-24 h-24 bg-red-500/10 blur-3xl rounded-full pointer-events-none"></div>
                <p class="text-xs text-gray-400 font-bold uppercase mb-2">مستحقات المنصة (عمولة)</p>
                <h2 id="platformDebt" class="text-5xl font-black text-red-500 tracking-tighter drop-shadow-md">0 <span class="text-sm text-white">ج.م</span></h2>
                <button onclick="openPayModal()" class="mt-4 text-[10px] bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white px-5 py-2.5 rounded-xl font-black transition-all border border-red-500/20 shadow-lg relative z-10">تصفية الحساب الآن ←</button>
            </div>
        </div>

        <div class="glass rounded-[35px] p-6 md:p-8 border-white/5 shadow-2xl">
            <h3 class="text-xl font-black mb-6 flex items-center gap-2 text-blue-400 italic border-b border-white/10 pb-4">
                📑 سجل العمليات الأخيرة
            </h3>
            <div id="transList" class="space-y-4 max-h-[400px] overflow-y-auto no-scrollbar pr-2">
                <p class="text-gray-500 text-sm italic text-center py-10 bg-black/20 rounded-2xl border border-white/5">جاري التحميل...</p>
            </div>
        </div>
    </div>

    <div id="payModal" class="fixed inset-0 bg-black/90 hidden z-[100] flex items-center justify-center p-4 backdrop-blur-sm transition-all">
        <div class="glass p-8 md:p-10 rounded-[40px] max-w-md w-full text-center animate-slide border border-blue-500/30 shadow-[0_0_50px_rgba(59,130,246,0.15)] relative overflow-hidden">
            <div class="absolute -top-10 -left-10 w-32 h-32 bg-blue-500/20 rounded-full blur-[40px] pointer-events-none"></div>
            
            <h3 class="text-2xl font-black mb-2 text-white italic drop-shadow-md">تصفية المديونية</h3>
            <p class="text-[11px] text-gray-400 mb-8 leading-relaxed font-bold">
                قم بتحويل المبلغ المستحق على رقم حساب المنصة <br>
                <span class="text-blue-400 font-mono text-lg block mt-2 tracking-widest" dir="ltr">0102XXXXXXXX</span> 
                ثم قم برفع صورة أو إيصال التحويل للمراجعة.
            </p>
            
            <input type="file" id="payReceipt" class="hidden">
            <label for="payReceipt" class="block bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white p-4 rounded-2xl font-black text-xs cursor-pointer mb-4 shadow-[0_0_20px_rgba(59,130,246,0.4)] transition-all transform hover:scale-105 tracking-widest">
                📸 اختر صورة الإيصال للرفع
            </label>
            
            <button onclick="closePayModal()" class="text-gray-500 hover:text-white text-xs font-black px-6 py-2 rounded-xl transition-colors">إلغاء وإغلاق</button>
        </div>
    </div>

    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="js/wallet.js"></script>
</body>
</html>
