<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحفظة المالية | Start Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f1f5f9; font-family: 'Cairo', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .card-grad { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto space-y-8">
        <h1 class="text-3xl font-black text-white italic">💰 الإحصائيات المالية</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="card-grad p-8 rounded-[35px] shadow-2xl relative overflow-hidden">
                <div class="absolute top-0 left-0 w-24 h-24 bg-blue-500/10 blur-3xl rounded-full"></div>
                <p class="text-xs text-gray-400 font-bold uppercase mb-2">أرباحك الحالية</p>
                <h2 id="userBalance" class="text-5xl font-black text-white tracking-tighter">0 <span class="text-sm">ج.م</span></h2>
                <p class="text-[10px] text-green-400 mt-4 font-bold">● جاهزة للسحب</p>
            </div>

            <div class="card-grad p-8 rounded-[35px] border-red-500/20">
                <p class="text-xs text-gray-400 font-bold uppercase mb-2">مستحقات المنصة (نسبة الموقع)</p>
                <h2 id="platformDebt" class="text-5xl font-black text-red-500 tracking-tighter">0 <span class="text-sm text-white">ج.م</span></h2>
                <button onclick="openPayModal()" class="mt-4 text-[10px] bg-white/5 hover:bg-white/10 px-4 py-2 rounded-xl font-bold transition-all">تصفية الحساب الآن ←</button>
            </div>
        </div>

        <div class="glass rounded-[35px] p-6 border-white/5">
            <h3 class="text-lg font-black mb-6 flex items-center gap-2">📑 سجل العمليات الأخيرة</h3>
            <div id="transList" class="space-y-4">
                <p class="text-gray-500 text-sm italic text-center py-10">لا توجد عمليات مسجلة حالياً.</p>
            </div>
        </div>
    </div>

    <div id="payModal" class="fixed inset-0 bg-black/90 hidden z-50 flex items-center justify-center p-4">
        <div class="glass p-8 rounded-[40px] max-w-sm w-full text-center">
            <h3 class="text-xl font-black mb-4">تصفية مديونية المنصة</h3>
            <p class="text-xs text-gray-400 mb-6 leading-relaxed">قم بتحويل المبلغ المستحق على رقم الإدارة (0102XXXXXXXX) ثم ارفع صورة الإيصال.</p>
            <input type="file" id="payReceipt" class="hidden">
            <label for="payReceipt" class="block bg-blue-600 p-4 rounded-2xl font-bold text-sm cursor-pointer mb-4">رفع إيصال التحويل</label>
            <button onclick="closePayModal()" class="text-gray-500 text-xs font-bold">إلغاء</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { /* استخدم بياناتك هنا */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // جلب بيانات المحفظة
                onValue(ref(db, `users/${user.uid}/wallet`), (snap) => {
                    const data = snap.val() || { balance: 0, debt: 0 };
                    document.getElementById('userBalance').innerHTML = `${data.balance} <span class="text-sm">ج.م</span>`;
                    document.getElementById('platformDebt').innerHTML = `${data.debt} <span class="text-sm text-white">ج.م</span>`;
                });

                // جلب سجل العمليات
                onValue(ref(db, `transactions/${user.uid}`), (snap) => {
                    const list = document.getElementById('transList');
                    list.innerHTML = "";
                    if(snap.exists()){
                        Object.values(snap.val()).reverse().forEach(t => {
                            list.innerHTML += `
                                <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/5">
                                    <div>
                                        <p class="text-xs font-black text-white">${t.title}</p>
                                        <p class="text-[9px] text-gray-500">${t.date}</p>
                                    </div>
                                    <span class="${t.type === 'plus' ? 'text-green-400' : 'text-red-400'} font-black text-sm">
                                        ${t.type === 'plus' ? '+' : '-'} ${t.amount} ج.م
                                    </span>
                                </div>`;
                        });
                    }
                });
            }
        });

        window.openPayModal = () => document.getElementById('payModal').classList.remove('hidden');
        window.closePayModal = () => document.getElementById('payModal').classList.add('hidden');
    </script>
</body>
</html>
