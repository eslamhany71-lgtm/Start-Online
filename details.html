<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><title>تفاصيل المنتج | Start Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); color: #f1f5f9; font-family: 'Cairo', sans-serif; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-6 md:p-20 flex items-center justify-center">

    <div id="productDetail" class="max-w-5xl w-full grid grid-cols-1 md:grid-cols-2 gap-10 glass p-8 rounded-[40px] animate-fade-in">
        <!-- الصورة -->
        <div class="rounded-3xl overflow-hidden shadow-2xl">
            <img id="detImg" src="" class="w-full h-full object-cover">
        </div>
        <!-- التفاصيل -->
        <div class="flex flex-col justify-center">
            <a href="products.html" class="text-blue-400 text-sm mb-4 inline-block underline">← العودة للمتجر</a>
            <h1 id="detName" class="text-4xl font-black mb-4">اسم المنتج</h1>
            <p class="text-gray-400 mb-8 leading-relaxed text-lg">هذا المنتج الرقمي مصمم بأعلى جودة لمساعدتك في بدء مشروعك أونلاين. ستحصل على كافة الملفات فور الشراء.</p>
            <div class="flex items-center gap-6 mb-10">
                <span id="detPrice" class="text-5xl font-black text-blue-400">$0</span>
                <span class="text-green-500 bg-green-500/10 px-4 py-1 rounded-full text-xs font-bold">متوفر للتحميل فوراً</span>
            </div>
            <button onclick="alert('سيتم ربط بوابة الدفع قريباً')" class="bg-white text-black py-4 rounded-2xl font-black text-xl hover:bg-blue-600 hover:text-white transition-all shadow-xl">تأكيد عملية الشراء</button>
        </div>
    </div>

    <script type="module">
        // كود لجلب بيانات المنتج من الرابط (URL)
        const params = new URLSearchParams(window.location.search);
        document.getElementById('detName').innerText = params.get('name');
        document.getElementById('detPrice').innerText = "$" + params.get('price');
        document.getElementById('detImg').src = params.get('image');
    </script>
</body>
</html>
