<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script src="translations.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8"><title>تفاصيل المنتج | Start Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); color: #f1f5f9; font-family: 'Cairo', sans-serif; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .animate-fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-6 md:p-20">

    <div class="max-w-6xl mx-auto">
        <a href="products.html" class="text-blue-400 mb-8 inline-block hover:underline font-bold">← العودة للمتجر</a>
        
        <!-- قسم عرض المنتج الرئيسي -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-12 glass p-10 rounded-[40px] shadow-2xl animate-fade-in">
            <!-- الصورة -->
            <div class="rounded-3xl overflow-hidden shadow-2xl border border-white/5">
                <img id="detImg" src="" class="w-full h-[450px] object-cover hover:scale-105 transition-transform duration-700">
            </div>
            <!-- التفاصيل -->
            <div class="flex flex-col justify-center">
                <div class="flex items-center gap-2 mb-4">
                    <span class="bg-blue-500/10 text-blue-400 text-[10px] font-black px-3 py-1 rounded-full border border-blue-500/20 uppercase tracking-widest">Digital Product</span>
                </div>
                <h1 id="detName" class="text-5xl font-black mb-6 italic text-white tracking-tighter">اسم المنتج</h1>
                <p class="text-gray-400 mb-8 leading-relaxed text-lg italic">هذا المنتج الرقمي تم فحصه وتوثيقه. شراءك للمنتج يضمن لك الحصول على الدعم الكامل وسرعة الاستلام بعد تأكيد جدية الحجز.</p>
                <div class="flex items-center gap-6 mb-10">
                    <div class="text-6xl font-black text-blue-400 tracking-tighter" id="detPrice">$0</div>
                    <div class="text-green-500 bg-green-500/10 px-4 py-1 rounded-xl text-[10px] font-black uppercase">متوفر الآن</div>
                </div>
                
                <!-- زر الشراء الجديد المربوط بصفحة الأوردر -->
                <button onclick="goToOrder()" class="bg-blue-600 text-white py-5 rounded-2xl font-black text-xl hover:bg-blue-500 transition-all shadow-xl shadow-blue-500/20 transform hover:-translate-y-1">
                    شراء الآن (دفع جدية حجز)
                </button>
            </div>
        </div>

        <!-- قسم التقييمات -->
        <div class="mt-20 grid grid-cols-1 md:grid-cols-3 gap-10">
            <!-- نموذج إضافة تقييم -->
            <div class="glass p-8 rounded-[35px] h-fit border border-white/5">
                <h3 class="text-xl font-black mb-4 text-blue-400 italic">أضف تقييمك</h3>
                <textarea id="revText" placeholder="ما هو انطباعك عن هذا المنتج؟" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500 text-sm mb-4 h-32 text-white"></textarea>
                <div class="mb-6">
                    <label class="block text-[10px] text-gray-500 font-bold mb-2 mr-2 uppercase">التقييم بالنجوم</label>
                    <select id="revStars" class="w-full bg-slate-800 border border-white/10 p-3 rounded-xl text-yellow-500 text-sm outline-none font-bold">
                        <option value="5">⭐⭐⭐⭐⭐ (ممتاز جداً)</option>
                        <option value="4">⭐⭐⭐⭐ (جيد جداً)</option>
                        <option value="3">⭐⭐⭐ (متوسط)</option>
                    </select>
                </div>
                <button id="btnRev" class="w-full bg-white/5 hover:bg-white hover:text-black py-4 rounded-2xl font-black transition text-xs tracking-widest uppercase">نشر التقييم</button>
            </div>

            <!-- قائمة آراء المستخدمين -->
            <div class="md:col-span-2 space-y-6">
                <h3 class="text-2xl font-black mb-6 flex items-center gap-3">
                    <span class="w-1.5 h-8 bg-blue-500 rounded-full"></span>
                    آراء العملاء
                </h3>
                <div id="reviewsList" class="space-y-4">
                    <!-- التقييمات تظهر هنا -->
                </div>
            </div>
        </div>
    </div>

    <!-- نظام التنبيهات (Toast) -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 glass px-8 py-4 rounded-2xl text-white font-bold shadow-2xl opacity-0 transition-all pointer-events-none z-[100] border-blue-500/50 border"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyypXt8LnHiVBR2Ka0Mb8ntXu6dJH9N-w",
            authDomain: "start-online-6f460.firebaseapp.com",
            projectId: "start-online-6f460",
            databaseURL: "https://start-online-6f460-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // جلب البيانات من الرابط
        const params = new URLSearchParams(window.location.search);
        const prodId = params.get('id');
        document.getElementById('detName').innerText = params.get('name');
        document.getElementById('detPrice').innerText = "$" + params.get('price');
        document.getElementById('detImg').src = params.get('image');

        let userProfile = null;
        let productOwnerId = ""; // سنحتاجه للأوردر

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await get(ref(db, 'users/' + user.uid));
                userProfile = snap.val();
                
                // جلب بيانات المنتج من القاعدة للتأكد من المالك (Owner)
                const prodSnap = await get(ref(db, 'products/' + prodId));
                if(prodSnap.exists()) {
                    productOwnerId = prodSnap.val().owner;
                }
                
                loadReviews();
            } else {
                // إذا لم يسجل دخول، نرجعه لصفحة الدخول
                window.location.href = "login.html";
            }
        });

        // وظيفة الذهاب لصفحة الطلب (Order)
        window.goToOrder = () => {
            if(!productOwnerId) {
                return showToast("جاري تحميل بيانات المسوق، انتظر ثانية...");
            }
            const url = `order.html?id=${prodId}&name=${encodeURIComponent(params.get('name'))}&price=${params.get('price')}&image=${encodeURIComponent(params.get('image'))}&owner=${productOwnerId}`;
            window.location.href = url;
        };

        // نظام المراجعات (Reviews)
        document.getElementById('btnRev').onclick = async () => {
            const text = document.getElementById('revText').value;
            const stars = document.getElementById('revStars').value;
            if(!text) return showToast("برجاء كتابة رأيك أولاً!");

            const revRef = ref(db, `reviews/${prodId}`);
            const newRev = push(revRef);
            await set(newRev, {
                userName: userProfile.name,
                text: text,
                stars: parseInt(stars),
                date: new Date().toLocaleDateString('ar-EG')
            });
            document.getElementById('revText').value = '';
            showToast("شكراً لك! تم نشر تقييمك بنجاح.");
        };

        function loadReviews() {
            onValue(ref(db, `reviews/${prodId}`), (snapshot) => {
                const list = document.getElementById('reviewsList');
                list.innerHTML = '';
                const data = snapshot.val();
                if(data) {
                    Object.values(data).reverse().forEach(r => {
                        list.innerHTML += `
                            <div class="glass p-6 rounded-[25px] border border-white/5 animate-fade-in">
                                <div class="flex justify-between items-center mb-3">
                                    <span class="font-black text-blue-400 text-sm tracking-wide">${r.userName}</span>
                                    <span class="text-yellow-500 text-xs">${'⭐'.repeat(r.stars)}</span>
                                </div>
                                <p class="text-gray-300 text-sm leading-relaxed italic">"${r.text}"</p>
                                <div class="text-[9px] text-gray-600 mt-4 font-bold uppercase tracking-widest">${r.date}</div>
                            </div>
                        `;
                    });
                } else {
                    list.innerHTML = '<p class="text-gray-600 text-sm italic mr-4">لا توجد مراجعات لهذا المنتج بعد. كن أول من يضع بصمته!</p>';
                }
            });
        }

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.opacity = '1';
            t.style.pointerEvents = 'auto';
            setTimeout(() => {
                t.style.opacity = '0';
                t.style.pointerEvents = 'none';
            }, 3000);
        };
    </script>
</body>
</html>
