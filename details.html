<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><title>تفاصيل المنتج | Start Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); color: #f1f5f9; font-family: 'Cairo', sans-serif; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-6 md:p-20">

    <div class="max-w-6xl mx-auto">
        <a href="products.html" class="text-blue-400 mb-8 inline-block hover:underline">← العودة للمتجر</a>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-12 glass p-10 rounded-[40px] shadow-2xl">
            <!-- الصورة -->
            <div class="rounded-3xl overflow-hidden shadow-2xl border border-white/5">
                <img id="detImg" src="" class="w-full h-[400px] object-cover">
            </div>
            <!-- التفاصيل -->
            <div class="flex flex-col justify-center">
                <h1 id="detName" class="text-5xl font-black mb-6 italic text-white">اسم المنتج</h1>
                <p class="text-gray-400 mb-8 leading-relaxed text-lg">هذا المنتج الرقمي تم التحقق منه من قبل فريق Start Online. ستحصل على رابط التحميل مباشرة بعد تأكيد الدفع.</p>
                <div class="text-5xl font-black text-blue-400 mb-10" id="detPrice">$0</div>
                <button onclick="showToast('سيتم تفعيل بوابة الدفع قريباً!')" class="bg-blue-600 text-white py-5 rounded-2xl font-black text-xl hover:bg-blue-500 transition-all shadow-xl shadow-blue-500/20">شراء المنتج الآن</button>
            </div>
        </div>

        <!-- قسم التقييمات -->
        <div class="mt-16 grid grid-cols-1 md:grid-cols-3 gap-10">
            <!-- نموذج كتابة تعليق -->
            <div class="glass p-8 rounded-3xl h-fit">
                <h3 class="text-xl font-bold mb-4 text-blue-400">أضف تقييمك</h3>
                <textarea id="revText" placeholder="ما رأيك في المنتج؟" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-blue-500 text-sm mb-4 h-32"></textarea>
                <div class="flex gap-2 mb-4">
                    <select id="revStars" class="bg-slate-800 border border-white/10 p-2 rounded-lg text-yellow-500 text-sm outline-none">
                        <option value="5">⭐⭐⭐⭐⭐ (ممتاز)</option>
                        <option value="4">⭐⭐⭐⭐ (جيد جداً)</option>
                        <option value="3">⭐⭐⭐ (متوسط)</option>
                    </select>
                </div>
                <button id="btnRev" class="w-full bg-white/10 hover:bg-white hover:text-black py-3 rounded-xl font-bold transition text-sm">نشر التقييم</button>
            </div>

            <!-- قائمة التعليقات -->
            <div class="md:col-span-2 space-y-4">
                <h3 class="text-xl font-bold mb-6">آراء المستخدمين</h3>
                <div id="reviewsList" class="space-y-4">
                    <!-- التعليقات تظهر هنا -->
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Message -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 glass px-8 py-4 rounded-2xl text-white font-bold shadow-2xl opacity-0 transition-all pointer-events-none z-[100] border-blue-500/50 border"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyypXt8LnHiVBR2Ka0Mb8ntXu6dJH9N-w",
            authDomain: "start-online-6f460.firebaseapp.com",
            projectId: "start-online-6f460",
            databaseURL: "https://start-online-6f460-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // جلب بيانات المنتج من الرابط
        const params = new URLSearchParams(window.location.search);
        const prodId = params.get('id'); // محتاجين الـ ID للتعليقات
        document.getElementById('detName').innerText = params.get('name');
        document.getElementById('detPrice').innerText = "$" + params.get('price');
        document.getElementById('detImg').src = params.get('image');

        let userProfile = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await get(ref(db, 'users/' + user.uid));
                userProfile = snap.val();
                loadReviews();
            }
        });

        // نشر تعليق
        document.getElementById('btnRev').onclick = async () => {
            const text = document.getElementById('revText').value;
            const stars = document.getElementById('revStars').value;
            if(!text) return showToast("اكتب تعليقاً أولاً!");

            const revRef = ref(db, `reviews/${prodId}`);
            const newRev = push(revRef);
            await set(newRev, {
                userName: userProfile.name,
                text: text,
                stars: stars,
                date: new Date().toLocaleDateString('ar-EG')
            });
            document.getElementById('revText').value = '';
            showToast("تم إضافة تقييمك بنجاح!");
        };

        // تحميل التعليقات
        function loadReviews() {
            onValue(ref(db, `reviews/${prodId}`), (snapshot) => {
                const list = document.getElementById('reviewsList');
                list.innerHTML = '';
                const data = snapshot.val();
                if(data) {
                    Object.values(data).reverse().forEach(r => {
                        list.innerHTML += `
                            <div class="glass p-6 rounded-2xl border border-white/5 animate-fade-in">
                                <div class="flex justify-between mb-2">
                                    <span class="font-bold text-blue-400">${r.userName}</span>
                                    <span class="text-yellow-500">${'⭐'.repeat(r.stars)}</span>
                                </div>
                                <p class="text-gray-300 text-sm leading-relaxed">${r.text}</p>
                                <div class="text-[10px] text-gray-600 mt-4">${r.date}</div>
                            </div>
                        `;
                    });
                } else {
                    list.innerHTML = '<p class="text-gray-600">لا توجد تقييمات لهذا المنتج بعد. كن أول من يقيم!</p>';
                }
            });
        }

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 3000);
        };
    </script>
</body>
</html>
