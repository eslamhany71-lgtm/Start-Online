<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js">
    <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js">
    <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='25' fill='%23020617'/%3E%3Cpath d='M50 20v35m0-35L35 35m15-15l15 15M30 75a30 30 0 0 0 40 0' stroke='%233b82f6' stroke-width='8' stroke-linecap='round' fill='none'/%3E%3C/svg%3E">
    
    <script src="translations.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-key="details_title">تفاصيل المنتج | Start Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
</head>
<body class="pb-24">

    <nav class="fixed top-0 left-0 right-0 z-50 p-3 md:p-6">
        <div class="max-w-7xl mx-auto glass rounded-[20px] md:rounded-[35px] px-4 md:px-8 py-3 md:py-4 flex justify-between items-center shadow-2xl">
            <div class="logo-brand text-lg md:text-2xl font-black italic tracking-tighter hover:scale-105 transition-transform">
                <a href="index.html" class="flex items-center gap-1" dir="ltr"> 
                    <span class="text-white">START</span><span class="logo-box">ONLINE</span>
                </a>
            </div>
            <ul class="hidden md:flex gap-10 font-bold text-xs text-gray-400">
                <li><a href="index.html" data-key="nav_home" class="hover:text-white transition">الرئيسية</a></li>
                <li><a href="products.html" data-key="nav_store" class="text-blue-400 hover:text-white transition drop-shadow-[0_0_8px_rgba(59,130,246,0.8)]">المتجر</a></li>
                <li><a href="profile.html" data-key="nav_profile" class="hover:text-white transition">حسابي</a></li>
            </ul>
            <div class="flex items-center gap-2 md:gap-4">
                <button onclick="setLanguage(localStorage.getItem('lang') === 'en' ? 'ar' : 'en')" class="flex text-[9px] md:text-[10px] font-black text-gray-400 hover:text-white transition items-center gap-1 md:gap-2 bg-white/5 px-2 md:px-4 py-2 rounded-lg md:rounded-xl border border-white/10 hover:bg-white/10">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="md:w-3 md:h-3"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                    <span id="langLabel">English</span>
                </button>
                <a href="products.html" class="bg-white/10 text-white px-4 py-2 md:py-3 rounded-xl md:rounded-2xl text-[10px] md:text-xs font-black hover:bg-white/20 transition border border-white/10">العودة للمتجر</a>
            </div>
        </div>
    </nav>

    <div class="pt-24 md:pt-32"></div>

    <main class="max-w-6xl mx-auto px-4 animate-fade-in">
        <div class="glass p-6 md:p-10 rounded-[40px] border border-white/10 shadow-2xl">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                
                <div class="space-y-4">
                    <div class="w-full h-72 md:h-96 rounded-[30px] overflow-hidden border border-white/5 shadow-2xl relative bg-white/5 flex items-center justify-center">
                        <img id="mainImage" src="" alt="Product Image" class="w-full h-full object-cover">
                    </div>
                    <div id="extraImagesContainer" class="flex gap-2 overflow-x-auto no-scrollbar py-2 hidden"></div>
                </div>

                <div class="text-right flex flex-col justify-center">
                    <div class="mb-6">
                        <h1 id="prodName" class="text-3xl md:text-4xl font-black text-white mb-2 leading-tight">جاري التحميل...</h1>
                        <p id="prodCategory" class="text-blue-400 font-bold text-xs bg-blue-500/10 inline-block px-3 py-1 rounded-lg border border-blue-500/20"></p>
                    </div>

                    <div class="bg-red-500/10 border border-red-500/20 p-4 rounded-2xl mb-6 animate-pulse-slow">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-red-400 font-bold text-xs md:text-sm">🔥 أسرع! العرض ينتهي خلال:</span>
                            <span id="countdownTimer" class="text-white font-black font-mono bg-red-500 px-3 py-1 rounded-xl text-sm md:text-base shadow-[0_0_15px_rgba(239,68,68,0.5)]">00:00:00</span>
                        </div>
                        <div class="text-[10px] text-gray-300 flex items-center gap-2">
                            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                            <span><strong id="visitorCount" class="text-white">14</strong> شخص يشاهدون هذا المنتج الآن!</span>
                        </div>
                    </div>

                    <div class="mb-6 pb-6 border-b border-white/10">
                        <h2 id="prodPrice" class="text-4xl font-black text-white tracking-tighter">0 ج.م</h2>
                        <p id="prodOldPrice" class="text-green-400 font-black text-sm mt-2 hidden"></p>
                    </div>

                    <div id="prodOptions" class="space-y-4 mb-8 hidden">
                        <div id="colorContainer" class="hidden">
                            <h4 class="text-xs text-gray-400 font-bold mb-2">اللون:</h4>
                            <div id="colorOptions" class="flex flex-wrap gap-2"></div>
                        </div>
                        <div id="sizeContainer" class="hidden">
                            <h4 class="text-xs text-gray-400 font-bold mb-2">المقاس:</h4>
                            <div id="sizeOptions" class="flex flex-wrap gap-2"></div>
                        </div>
                    </div>

                    <div class="flex items-center gap-4 mb-8 bg-white/5 p-2 rounded-2xl w-fit border border-white/10">
                        <button onclick="updateQty(1)" class="w-10 h-10 bg-white/10 rounded-xl text-white font-black hover:bg-white/20 transition">+</button>
                        <span id="qtyDisplay" class="w-10 text-center font-black text-lg">1</span>
                        <button onclick="updateQty(-1)" class="w-10 h-10 bg-white/10 rounded-xl text-white font-black hover:bg-white/20 transition">-</button>
                    </div>

                    <div class="flex gap-4">
                        <button onclick="addToCart()" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-5 rounded-[20px] font-black text-sm transition-all shadow-[0_0_20px_rgba(59,130,246,0.4)] active:scale-95 flex items-center justify-center gap-2">
                            🛒 أضف إلى السلة
                        </button>
                        <button onclick="goToOrderFast()" class="flex-1 bg-green-600 hover:bg-green-500 text-white py-5 rounded-[20px] font-black text-sm transition-all shadow-[0_0_20px_rgba(34,197,94,0.4)] active:scale-95">
                            ⚡ اطلب الآن
                        </button>
                    </div>
                </div>
            </div>

            <div class="mt-12 grid grid-cols-1 md:grid-cols-3 gap-8 border-t border-white/10 pt-12 text-right">
                <div class="md:col-span-2">
                    <h3 class="text-xl font-black text-white mb-4 italic decoration-blue-500 underline">وصف المنتج</h3>
                    <p id="prodDesc" class="text-gray-300 text-sm leading-relaxed whitespace-pre-line bg-white/5 p-6 rounded-3xl border border-white/5">لا يوجد وصف متاح.</p>
                </div>
                
                <div class="bg-black/20 p-6 rounded-3xl border border-yellow-500/20 shadow-inner">
                    <h3 class="text-xl font-black text-yellow-400 mb-4 italic">التقييمات ⭐</h3>
                    <div id="reviewsList" class="space-y-4 mb-6 max-h-64 overflow-y-auto no-scrollbar">
                        <p class="text-gray-500 text-xs text-center py-4">لا توجد تقييمات بعد. كن أول من يقيّم!</p>
                    </div>
                    <div class="border-t border-white/5 pt-4">
                        <select id="reviewRating" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl mb-3 text-xs text-white outline-none">
                            <option value="5">⭐⭐⭐⭐⭐ ممتاز</option>
                            <option value="4">⭐⭐⭐⭐ جيد جداً</option>
                            <option value="3">⭐⭐⭐ جيد</option>
                            <option value="2">⭐⭐ مقبول</option>
                            <option value="1">⭐ سيء</option>
                        </select>
                        <textarea id="reviewText" placeholder="اكتب تقييمك هنا..." class="w-full bg-white/5 border border-white/10 p-3 rounded-xl mb-3 text-xs text-white outline-none resize-none h-20"></textarea>
                        <button onclick="submitReview()" class="w-full bg-yellow-500/20 text-yellow-500 py-3 rounded-xl font-black text-xs hover:bg-yellow-500 hover:text-black transition">أضف تقييمك</button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 glass px-10 py-5 rounded-full text-white font-black shadow-2xl opacity-0 transition-all pointer-events-none z-[500] border-blue-500 border text-xs tracking-widest uppercase italic text-center"></div>

    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="js/details.js"></script>
</body>
</html>
