<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <!-- ملف الترجمة -->
    <script src="translations.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Online | ابدأ عالمك الرقمي</title>
    
    <!-- محرك التنسيق والخطوط -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background-color: #020617; /* لون أزرق ليلي عميق */
            color: #f1f5f9;
            font-family: 'Cairo', sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        /* طبقة الصورة الخلفية (AI Theme) */
        .bg-image-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            /* رابط صورة AI احترافية */
            background-image: url('https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            opacity: 0.20; /* شفافية منخفضة جداً لتكون هادئة */
            filter: grayscale(100%) brightness(0.5); /* جعلها رمادية لتتناسق مع الألوان */
            z-index: -3;
            animation: slowZoom 20s infinite alternate;
            pointer-events: none;
        }

        /* طبقة الشبكة الرقمية */
        .bg-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.08) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(circle at center, black, transparent 90%);
            -webkit-mask-image: radial-gradient(circle at center, black, transparent 90%);
            z-index: -1;
            pointer-events: none;
        }

        /* طبقة التوهج الملون (Mesh) */
        .bg-mesh {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.25) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.2) 0px, transparent 50%);
            z-index: -2;
            pointer-events: none;
        }

        /* التوهج المتحرك مع الماوس */
        #mouseGlow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
            transform: translate(-50%, -50%);
            will-change: left, top;
        }

        @keyframes slowZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .glass {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-glow {
            transition: 0.4s;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }
        .btn-glow:hover {
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.7);
            transform: translateY(-3px) scale(1.02);
        }

        .animate-fade { animation: fadeIn 1.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- طبقات الخلفية المتعددة -->
    <div class="bg-image-layer"></div>
    <div class="bg-mesh"></div>
    <div class="bg-grid"></div>
    <div id="mouseGlow"></div>

    <!-- 1. شريط التنقل العلوي -->
    <nav class="fixed top-0 left-0 right-0 z-50 p-3 md:p-6">
        <div class="max-w-7xl mx-auto glass rounded-xl md:rounded-3xl px-5 md:px-8 py-3 md:py-4 flex justify-between items-center shadow-2xl">
            
            <div class="text-xl md:text-2xl font-black text-white tracking-tighter">
                <a href="index.html">START<span class="text-blue-500">ONLINE</span></a>
            </div>

            <ul class="hidden md:flex gap-10 font-bold text-sm text-gray-300">
                <li><a href="index.html" class="text-blue-400 font-bold italic">الرئيسية</a></li>
                <li><a href="products.html" class="hover:text-white transition">المتجر</a></li>
                <li><a href="profile.html" class="hover:text-white transition">حسابي</a></li>
            </ul>

            <div class="flex gap-2">
                <a href="login.html" id="navBtn" class="bg-blue-600 text-white px-5 md:px-8 py-2 md:py-2.5 rounded-xl text-[10px] md:text-sm font-black btn-glow transition-all whitespace-nowrap">
                    ابدأ الآن
                </a>
            </div>
        </div>
    </nav>

    <!-- 2. شريط التنقل السفلي للموبايل -->
    <nav class="fixed bottom-4 left-4 right-4 z-50 md:hidden">
        <div class="glass rounded-[25px] p-2 flex justify-around items-center border border-white/10 shadow-2xl">
            <a href="index.html" class="flex flex-col items-center gap-1 text-[10px] text-blue-400 p-2">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                <span class="font-bold">الرئيسية</span>
            </a>
            <a href="products.html" class="flex flex-col items-center gap-1 text-[10px] text-gray-400 p-2 hover:text-white">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>
                <span class="font-bold">المتجر</span>
            </a>
            <a href="profile.html" class="flex flex-col items-center gap-1 text-[10px] text-gray-400 p-2 hover:text-white">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span class="font-bold">حسابي</span>
            </a>
        </div>
    </nav>

    <div class="pt-24 md:pt-32"></div>

    <!-- Hero Section -->
    <section class="h-[80vh] flex flex-col justify-center items-center text-center px-6 animate-fade">
        <h1 class="text-5xl md:text-8xl font-black mb-8 leading-tight text-white tracking-tighter">
            مستقبلك الرقمي <br> 
            <span class="text-blue-500 italic bg-gradient-to-r from-blue-400 to-cyan-400 bg-clip-text text-transparent">يبدأ بلمسة</span>
        </h1>
        <p class="text-gray-400 text-sm md:text-xl max-w-2xl mb-12 leading-relaxed italic opacity-90">
            انضم لأكبر منصة عربية لعرض وبيع المنتجات الرقمية. نحن نوفر لك لوحة تحكم ذكية مدعومة بتقنيات السحاب، لتُبدع في عالمك الخاص.
        </p>
        
        <div class="flex flex-col md:flex-row justify-center gap-6 w-full md:w-auto">
            <a href="products.html" class="bg-white text-slate-950 px-12 py-4 rounded-2xl font-black btn-glow text-sm md:text-lg transition-all transform hover:scale-105 shadow-xl">
                تصفح المتجر
            </a>
            <a href="login.html" id="marketerBtn" class="glass text-white px-12 py-4 rounded-2xl font-bold text-sm md:text-lg hover:bg-white/10 transition-all border border-white/10 shadow-xl">
                لوحة المسوقين
            </a>
        </div>
    </section>

    <!-- Firebase & Mouse Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyypXt8LnHiVBR2Ka0Mb8ntXu6dJH9N-w",
            authDomain: "start-online-6f460.firebaseapp.com",
            projectId: "start-online-6f460",
            databaseURL: "https://start-online-6f460-default-rtdb.firebaseio.com/"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snapshot = await get(ref(db, 'users/' + user.uid));
                if (snapshot.exists()) {
                    const u = snapshot.val();
                    const navBtn = document.getElementById('navBtn');
                    const marketerBtn = document.getElementById('marketerBtn');
                    
                    navBtn.innerText = "لوحة التحكم";
                    navBtn.href = "products.html";
                    
                    if(marketerBtn) {
                        marketerBtn.innerText = (u.role === 'customer') ? "كن مسوقاً معنا" : "انتقل للوحة التحكم";
                        marketerBtn.href = "products.html";
                    }
                }
            }
        });

        // حركة الماوس اللحظية (عالية الأداء)
        const glow = document.getElementById('mouseGlow');
        window.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
