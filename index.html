<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script src="translations.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Online | ابدأ عالمك الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; min-height: 100vh; background-color: #020617; color: #f1f5f9; font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        .bg-image-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&q=80&w=2000'); background-size: cover; background-position: center; opacity: 0.15; filter: grayscale(100%) brightness(0.5); z-index: -3; animation: slowZoom 20s infinite alternate; pointer-events: none; }
        .bg-grid { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(59, 130, 246, 0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(59, 130, 246, 0.08) 1px, transparent 1px); background-size: 50px 50px; mask-image: radial-gradient(circle at center, black, transparent 90%); -webkit-mask-image: radial-gradient(circle at center, black, transparent 90%); z-index: -1; }
        #mouseGlow { position: fixed; width: 600px; height: 600px; background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%); border-radius: 50%; pointer-events: none; z-index: -1; transform: translate(-50%, -50%); will-change: left, top; }
        .glass { background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-glow { transition: 0.4s; box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        .btn-glow:hover { box-shadow: 0 0 40px rgba(59, 130, 246, 0.7); transform: translateY(-3px); }
        @keyframes slowZoom { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
    </style>
</head>
<body>

    <div class="bg-image-layer"></div>
    <div id="mouseGlow"></div>
    <div class="bg-grid"></div>

    <nav class="fixed top-0 left-0 right-0 z-50 p-4 md:p-6">
        <div class="max-w-7xl mx-auto glass rounded-2xl md:rounded-3xl px-6 py-3 flex justify-between items-center shadow-2xl">
            
            <div class="text-xl md:text-2xl font-black text-white tracking-tighter">
                <a href="index.html">START<span class="text-blue-500">ONLINE</span></a>
            </div>

            <ul class="hidden md:flex gap-8 font-bold text-sm text-gray-300">
                <li><a href="index.html" data-key="nav_home" class="text-blue-400">الرئيسية</a></li>
                <li><a href="products.html" data-key="nav_store" class="hover:text-white transition">المتجر</a></li>
                <li><a href="profile.html" data-key="nav_profile" class="hover:text-white transition">حسابي</a></li>
            </ul>

            <div class="flex items-center gap-4">
                <button onclick="setLanguage(localStorage.getItem('lang') === 'en' ? 'ar' : 'en')" class="text-xs font-bold text-gray-400 hover:text-white transition flex items-center gap-1 bg-white/5 px-3 py-2 rounded-lg border border-white/10">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                    <span id="langLabel">English</span>
                </button>

                <a href="login.html" id="navBtn" data-key="nav_start" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl text-xs md:text-sm font-black btn-glow transition-all">
                    ابدأ الآن
                </a>
            </div>
        </div>
    </nav>

    <nav class="fixed bottom-4 left-4 right-4 z-50 md:hidden">
        <div class="glass rounded-[25px] p-2 flex justify-around items-center border border-white/10 shadow-2xl">
            <a href="index.html" class="flex flex-col items-center gap-1 text-[10px] text-blue-400 p-2">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                <span data-key="nav_home" class="font-bold">الرئيسية</span>
            </a>
            </div>
    </nav>

    <section class="min-h-screen flex flex-col justify-center items-center text-center px-6 pt-20">
        <h1 data-key="hero_title" class="text-5xl md:text-8xl font-black mb-8 leading-tight text-white tracking-tighter">
            مستقبلك الرقمي <br> <span class="text-blue-500 italic">يبدأ بلمسة</span>
        </h1>
        <p data-key="hero_desc" class="text-gray-400 text-sm md:text-xl max-w-2xl mb-12 leading-relaxed opacity-90">
            انضم لأكبر منصة عربية لعرض وبيع المنتجات الرقمية.
        </p>
        
        <div class="flex flex-col md:flex-row justify-center gap-6 w-full md:w-auto">
            <a href="products.html" data-key="btn_browse" class="bg-white text-slate-950 px-12 py-4 rounded-2xl font-black btn-glow text-sm md:text-lg transition-all">
                تصفح المتجر
            </a>
            <a href="login.html" id="marketerBtn" data-key="btn_marketer" class="glass text-white px-12 py-4 rounded-2xl font-bold text-sm md:text-lg hover:bg-white/10 transition-all border border-white/10">
                لوحة المسوقين
            </a>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // ... نفس الـ config بتاعك ...
        const firebaseConfig = { apiKey: "AIzaSyCyypXt8LnHiVBR2Ka0Mb8ntXu6dJH9N-w", authDomain: "start-online-6f460.firebaseapp.com", projectId: "start-online-6f460", databaseURL: "https://start-online-6f460-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // تحديث زر اللغة
        const currentLang = localStorage.getItem('lang') || 'ar';
        document.getElementById('langLabel').innerText = currentLang === 'ar' ? 'English' : 'العربية';

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snapshot = await get(ref(db, 'users/' + user.uid));
                if (snapshot.exists()) {
                    const u = snapshot.val();
                    const navBtn = document.getElementById('navBtn');
                    const marketerBtn = document.getElementById('marketerBtn');
                    
                    navBtn.setAttribute('data-key', 'nav_dashboard');
                    navBtn.href = "dashboard.html"; // يفضل لوحة تحكم منفصلة
                    
                    if(marketerBtn) {
                        marketerBtn.setAttribute('data-key', u.role === 'customer' ? 'btn_be_marketer' : 'nav_dashboard');
                    }
                    // إعادة تطبيق الترجمة بعد تغيير الـ Keys ديناميكياً
                    if(window.applyLanguage) applyLanguage(currentLang);
                }
            }
        });

        const glow = document.getElementById('mouseGlow');
        window.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
