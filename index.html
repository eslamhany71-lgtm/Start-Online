<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script src="translations.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Online | ابدأ عالمك الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: #f1f5f9;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-glow {
            transition: 0.4s;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2);
        }
        .btn-glow:hover {
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
            transform: translateY(-2px);
        }
        .fade-in {
            animation: fadeIn 1.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
    <!-- كود مترجم جوجل السحري -->
<div id="google_translate_element" style="position:fixed; bottom:20px; left:20px; z-index:1000;"></div>

<script type="text/javascript">
function googleTranslateElementInit() {
  new google.translate.TranslateElement({pageLanguage: 'ar', includedLanguages: 'ar,en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
}
</script>
<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<style>
    /* تعديل شكل زرار الترجمة عشان يليق بموقعك الفخم */
    .goog-te-gadget-simple {
        background: rgba(255,255,255,0.05) !important;
        border: 1px solid rgba(255,255,255,0.1) !important;
        padding: 8px !important;
        border-radius: 12px !important;
        backdrop-filter: blur(10px);
    }
    .goog-te-gadget-simple span { color: #fff !important; }
    .goog-te-banner-frame.skiptranslate { display: none !important; }
    body { top: 0px !important; }
</style>
<body>

<!-- 1. شريط التنقل العلوي (Logo + Auth Button) -->
<nav class="fixed top-0 left-0 right-0 z-50 p-2 md:p-6">
    <div class="max-w-7xl mx-auto glass rounded-xl md:rounded-2xl px-4 py-3 flex justify-between items-center shadow-2xl">
        
        <!-- اللوجو -->
        <div class="text-lg md:text-2xl font-black text-white">
            <a href="index.html">START<span class="text-blue-400">ONLINE</span></a>
        </div>

        <!-- روابط الكمبيوتر (تختفي في الموبايل) -->
        <ul class="hidden md:flex gap-8 font-bold text-sm text-gray-300">
            <li><a href="index.html" class="hover:text-white transition">الرئيسية</a></li>
            <li><a href="products.html" class="hover:text-white transition">المتجر</a></li>
            <li><a href="profile.html" class="hover:text-white transition">حسابي</a></li>
        </ul>

        <!-- زر التحكم (يظهر في الجهازين) -->
        <div class="flex gap-2">
            <a href="login.html" id="navBtn" class="bg-blue-600 text-white px-4 md:px-8 py-2 rounded-lg md:rounded-xl text-[10px] md:text-xs font-black btn-glow transition-all whitespace-nowrap">
                ابدأ الآن
            </a>
        </div>
    </div>
</nav>

<!-- 2. شريط التنقل السفلي للموبايل (يظهر فقط في الشاشات الصغيرة) -->
<nav class="fixed bottom-4 left-4 right-4 z-50 md:hidden animate-slide">
    <div class="glass rounded-2xl p-2 flex justify-around items-center shadow-2xl border border-white/10">
        <!-- رابط الرئيسية -->
        <a href="index.html" class="flex flex-col items-center gap-1 text-[10px] text-gray-400 hover:text-blue-400 p-2 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span class="font-bold">الرئيسية</span>
        </a>
        <!-- رابط المتجر -->
        <a href="products.html" class="flex flex-col items-center gap-1 text-[10px] text-gray-400 hover:text-blue-400 p-2 transition-all border-x border-white/5 px-6">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            <span class="font-bold">المتجر</span>
        </a>
        <!-- رابط حسابي -->
        <a href="profile.html" class="flex flex-col items-center gap-1 text-[10px] text-gray-400 hover:text-blue-400 p-2 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span class="font-bold">حسابي</span>
        </a>
    </div>
</nav>

<!-- مسافة أمان علوية (ضرورية لكل الصفحات) -->
<div class="pt-24 md:pt-32"></div>

    <!-- Hero Section -->
    <section class="h-screen flex flex-col justify-center items-center text-center px-4 fade-in">
        <h1 class="text-5xl md:text-8xl font-black mb-8 leading-tight text-white tracking-tight">
            مستقبلك الرقمي <br> 
            <span class="text-blue-400 italic bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">يبدأ بلمسة</span>
        </h1>
        <p class="text-gray-400 text-lg md:text-xl max-w-2xl mb-12 leading-relaxed italic">
            انضم لأكبر منصة عربية لعرض وبيع المنتجات الرقمية. نحن نوفر لك لوحة تحكم ذكية، وأنت تبدع في التسويق.
        </p>
        
        <div class="flex flex-wrap justify-center gap-6">
            <a href="products.html" class="bg-white text-slate-900 px-12 py-4 rounded-2xl font-black btn-glow text-lg transition-all transform hover:scale-105 shadow-xl">
                تصفح المتجر
            </a>
            
            <!-- الزرار اللي كان عامل مشكلة - أضفت له id="marketerBtn" -->
            <a href="login.html" id="marketerBtn" class="glass text-white px-12 py-4 rounded-2xl font-bold text-lg hover:bg-white/10 transition-all flex items-center gap-2 border border-white/10 shadow-xl">
                لوحة المسوقين
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </a>
        </div>
    </section>

    <!-- Firebase Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyypXt8LnHiVBR2Ka0Mb8ntXu6dJH9N-w",
            authDomain: "start-online-6f460.firebaseapp.com",
            projectId: "start-online-6f460",
            databaseURL: "https://start-online-6f460-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const navBtn = document.getElementById('navBtn');
        const marketerBtn = document.getElementById('marketerBtn');

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snapshot = await get(ref(db, 'users/' + user.uid));
                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    
                    // تحديث زرار النافبار (العلوي)
                    navBtn.innerText = "لوحة التحكم";
                    navBtn.href = "products.html";
                    navBtn.classList.replace('bg-blue-600', 'bg-white/10');
                    navBtn.classList.add('border', 'border-white/10');

                    // تحديث الزرار الكبير (اللي في نص الشاشة)
                    if (marketerBtn) {
                        marketerBtn.innerText = "انتقل للوحة التحكم";
                        marketerBtn.href = "products.html";
                        // لو هو عميل عادي ممكن نغير الكلمة لـ "لوحة المسوق" بس نوديه للمتجر برضه
                        if(userData.role === 'customer') {
                            marketerBtn.innerText = "كن مسوقاً معنا";
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
