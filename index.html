<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script src="translations.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Online | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background-color: #020617; color: #f1f5f9; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-glow:hover { box-shadow: 0 0 30px rgba(59, 130, 246, 0.5); transform: translateY(-2px); }
    </style>
</head>
<body>
    <nav class="fixed top-0 left-0 right-0 z-50 p-4 md:p-6">
        <div class="max-w-7xl mx-auto glass rounded-2xl px-6 py-3 flex justify-between items-center shadow-2xl">
            <div class="text-xl md:text-2xl font-black text-white">START<span class="text-blue-500">ONLINE</span></div>
            <ul class="hidden md:flex gap-8 font-bold text-sm text-gray-300">
                <li><a href="index.html" data-key="nav_home" class="text-blue-400">الرئيسية</a></li>
                <li><a href="products.html" data-key="nav_store">المتجر</a></li>
                <li><a href="profile.html" data-key="nav_profile">حسابي</a></li>
            </ul>
            <div class="flex items-center gap-4">
                <button onclick="setLanguage(localStorage.getItem('lang') === 'en' ? 'ar' : 'en')" class="text-xs font-bold text-gray-400 hover:text-white transition bg-white/5 px-3 py-2 rounded-lg border border-white/10">
                    <span id="langLabel">English</span>
                </button>
                <a href="login.html" id="navBtn" data-key="nav_start" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl text-xs font-black btn-glow transition-all">ابدأ الآن</a>
            </div>
        </div>
    </nav>

    <section class="min-h-screen flex flex-col justify-center items-center text-center px-6">
        <h1 data-key="hero_title" class="text-5xl md:text-8xl font-black mb-8 leading-tight">مستقبلك الرقمي <br> <span class="text-blue-500 italic">يبدأ بلمسة</span></h1>
        <p data-key="hero_desc" class="text-gray-400 text-sm md:text-xl max-w-2xl mb-12">انضم لأكبر منصة عربية للمنتجات الرقمية.</p>
        <div class="flex flex-col md:flex-row gap-6 w-full md:w-auto">
            <a href="products.html" data-key="btn_browse" class="bg-white text-slate-950 px-12 py-4 rounded-2xl font-black btn-glow transition-all">تصفح المتجر</a>
            <a href="login.html" data-key="btn_marketer" class="glass text-white px-12 py-4 rounded-2xl font-bold border border-white/10">لوحة المسوقين</a>
        </div>
    </section>
</body>
</html>
