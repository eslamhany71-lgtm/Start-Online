<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script src="translations.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-key="index_title">Start Online | ابدأ عالمك الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; min-height: 100vh; background-color: #020617; color: #f1f5f9; font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        
        /* تحسين طبقات الخلفية - حركة سينمائية حية */
        .bg-image-layer { 
            position: fixed; top: -5%; left: -5%; width: 110%; height: 110%; 
            background-image: url('https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&q=80&w=2000'); 
            background-size: cover; background-position: center; 
            opacity: 0.15; filter: grayscale(80%) brightness(0.5) contrast(1.2); 
            z-index: -4; 
            animation: cinematicPan 30s ease-in-out infinite alternate; 
            pointer-events: none; 
        }
        
        .bg-grid { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-image: linear-gradient(rgba(59, 130, 246, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(59, 130, 246, 0.05) 1px, transparent 1px); 
            background-size: 40px 40px; mask-image: radial-gradient(circle at center, black, transparent 80%); 
            z-index: -3; 
        }

        /* الكرات الضوئية الفخمة (Glowing Orbs) */
        .orb-1 { position: absolute; top: 10%; left: 20%; width: 40vw; height: 40vw; background: #3b82f6; border-radius: 50%; filter: blur(120px); opacity: 0.15; animation: floatOrb 12s infinite ease-in-out; z-index: -2; pointer-events: none; }
        .orb-2 { position: absolute; bottom: 10%; right: 15%; width: 35vw; height: 35vw; background: #8b5cf6; border-radius: 50%; filter: blur(140px); opacity: 0.15; animation: floatOrb 15s infinite ease-in-out reverse; z-index: -2; pointer-events: none; }
        
        /* توهج الماوس المطور */
        #mouseGlow { position: fixed; width: 700px; height: 700px; background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 60%); border-radius: 50%; pointer-events: none; z-index: -1; transform: translate(-50%, -50%); transition: opacity 0.3s; will-change: left, top; mix-blend-mode: screen; }
        
        .glass { background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* لوجو احترافي */
        .logo-brand { font-family: 'Inter', sans-serif; display: flex; align-items: center; gap: 4px; }
        .logo-box { background: #2563eb; color: white; padding: 2px 8px; border-radius: 6px; transform: skewX(-12deg); display: inline-block; box-shadow: 0 0 15px rgba(37, 99, 235, 0.4); }

        /* نص الهيرو الخرافي */
        .hero-gradient-text {
            background: linear-gradient(135deg, #ffffff 20%, #93c5fd 80%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 15px 25px rgba(59, 130, 246, 0.15));
            animation: textShimmer 3s infinite alternate;
        }

        .btn-glow { transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); border: 1px solid rgba(255,255,255,0.1); }
        .btn-glow:hover { box-shadow: 0 0 40px rgba(59, 130, 246, 0.8); transform: translateY(-5px) scale(1.02); }
        
        @keyframes cinematicPan { 
            0% { transform: scale(1) translate(0, 0); } 
            50% { transform: scale(1.08) translate(-2%, -1%); }
            100% { transform: scale(1.15) translate(1%, 2%); } 
        }
        @keyframes floatOrb {
            0% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
            100% { transform: translateY(0) scale(1); }
        }
    </style>
</head>
<body>

    <div class="bg-image-layer"></div>
    <div class="bg-grid"></div>
    <div class="orb-1"></div>
    <div class="orb-2"></div>
    <div id="mouseGlow"></div>

    <nav class="fixed top-0 left-0 right-0 z-50 p-3 md:p-6">
        <div class="max-w-7xl mx-auto glass rounded-[20px] md:rounded-[35px] px-4 md:px-8 py-3 md:py-4 flex justify-between items-center shadow-2xl">
            
            <div class="logo-brand text-lg md:text-2xl font-black italic tracking-tighter hover:scale-105 transition-transform">
                <a href="index.html" class="flex items-center gap-1">
                    <span class="text-white">START</span>
                    <span class="logo-box">ONLINE</span>
                </a>
            </div>

            <ul class="hidden md:flex gap-10 font-bold text-xs text-gray-400">
                <li><a href="index.html" data-key="nav_home" class="text-blue-400 hover:text-white transition drop-shadow-[0_0_8px_rgba(59,130,246,0.8)]">الرئيسية</a></li>
                <li><a href="products.html" data-key="nav_store" class="hover:text-white transition">المتجر</a></li>
                <li><a href="profile.html" data-key="nav_profile" class="hover:text-white transition">حسابي</a></li>
            </ul>

            <div class="flex items-center gap-2 md:gap-4">
                <button onclick="setLanguage(localStorage.getItem('lang') === 'en' ? 'ar' : 'en')" class="flex text-[9px] md:text-[10px] font-black text-gray-400 hover:text-white transition items-center gap-1 md:gap-2 bg-white/5 px-2 md:px-4 py-2 rounded-lg md:rounded-xl border border-white/10 hover:bg-white/10">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="md:w-3 md:h-3"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                    <span id="langLabel">English</span>
                </button>

                <a href="login.html" id="navBtn" class="bg-blue-600 text-white px-4 md:px-8 py-2 md:py-3 rounded-xl md:rounded-2xl text-[10px] md:text-xs font-black btn-glow transition-all relative overflow-hidden group">
                    <span class="relative z-10" data-key="nav_start">ابدأ الآن</span>
                    <div class="absolute inset-0 h-full w-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></div>
                </a>
            </div>
        </div>
    </nav>

    <nav class="fixed bottom-6 left-6 right-6 z-50 md:hidden">
        <div class="glass rounded-[30px] p-3 flex justify-around items-center border border-white/10 shadow-[0_10px_40px_rgba(0,0,0,0.8)]">
            <a href="index.html" class="flex flex-col items-center gap-1 text-[10px] text-blue-400 p-2">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                <span data-key="nav_home" class="font-black drop-shadow-[0_0_5px_rgba(59,130,246,0.5)]">الرئيسية</span>
            </a>
            <a href="products.html" class="flex flex-col items-center gap-1 text-[10px] text-gray-500 p-2 hover:text-white transition">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                <span data-key="nav_store" class="font-black">المتجر</span>
            </a>
            <a href="profile.html" class="flex flex-col items-center gap-1 text-[10px] text-gray-500 p-2 hover:text-white transition">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span data-key="nav_profile" class="font-black">حسابي</span>
            </a>
        </div>
    </nav>

    <section class="min-h-screen flex flex-col justify-center items-center text-center px-6 md:px-8 pt-20 relative z-10">
        <div class="animate-[fadeIn_1s_ease-out]">
            <h1 class="text-6xl md:text-9xl font-black mb-6 md:mb-8 leading-[1.1] tracking-tighter hero-gradient-text">
                <span data-key="hero_title_1">مستقبلك الرقمي</span> <br> 
                <span class="italic text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500" data-key="hero_title_2">يبدأ بلمسة</span>
            </h1>
            <p data-key="hero_desc" class="text-gray-300 text-sm md:text-xl max-w-2xl mx-auto mb-10 md:mb-14 leading-relaxed font-bold opacity-90 drop-shadow-md">
                انضم لأكبر منصة عربية لعرض وبيع المنتجات الرقمية. نحن نوفر لك البيئة المثالية للإبداع والربح من أول يوم.
            </p>
            
            <div class="flex flex-col md:flex-row justify-center gap-4 md:gap-6 w-full md:w-auto">
                <a href="products.html" class="bg-white text-slate-950 px-10 md:px-14 py-4 md:py-5 rounded-[20px] md:rounded-[22px] font-black btn-glow text-sm md:text-lg transition-all flex items-center justify-center gap-2">
                    <span>🛍️</span> <span data-key="btn_browse">تصفح المتجر</span>
                </a>
                <a href="login.html" id="marketerBtn" class="glass text-white px-10 md:px-14 py-4 md:py-5 rounded-[20px] md:rounded-[22px] font-bold text-sm md:text-lg hover:bg-white/10 transition-all border border-white/10 hover:border-blue-500/50 hover:shadow-[0_0_20px_rgba(59,130,246,0.3)] flex items-center justify-center gap-2">
                    <span>🚀</span> <span data-key="btn_community">انضم لمجتمعنا</span>
                </a>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCyypXt8LnHiVBR2Ka0Mb8ntXu6dJH9N-w", authDomain: "start-online-6f460.firebaseapp.com", projectId: "start-online-6f460", databaseURL: "https://start-online-6f460-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // تحديث حالة الأزرار عند تسجيل الدخول
        onAuthStateChanged(auth, async (user) => {
            const navBtn = document.getElementById('navBtn');
            if (user) {
                // تحويل الزر العلوي لزر خروج وإضافة data-key
                navBtn.innerHTML = `<span class="relative z-10" data-key="logout">خروج</span>`;
                navBtn.classList.replace('bg-blue-600', 'bg-red-600/20');
                navBtn.classList.add('text-red-500', 'border', 'border-red-600/30', 'hover:bg-red-600', 'hover:text-white');
                navBtn.classList.remove('btn-glow');
                navBtn.href = "#";
                navBtn.onclick = () => {
                    signOut(auth).then(() => location.reload());
                };

                // تحديث زر المجتمع ليكون "لوحة التحكم"
                const snapshot = await get(ref(db, 'users/' + user.uid));
                if (snapshot.exists()) {
                    const marketerBtn = document.getElementById('marketerBtn');
                    marketerBtn.innerHTML = `<span>📊</span> <span data-key="dashboard">لوحة التحكم</span>`;
                    marketerBtn.href = "profile.html";
                }
                
                // إعادة تشغيل الترجمة عشان تترجم الأزرار الجديدة
                if(window.applyLanguage) applyLanguage(localStorage.getItem('lang') || 'ar');
            }
        });

        // حركة توهج الماوس (Smoother)
        const glow = document.getElementById('mouseGlow');
        window.addEventListener('mousemove', (e) => {
            requestAnimationFrame(() => {
                glow.style.left = e.clientX + 'px';
                glow.style.top = e.clientY + 'px';
            });
        });

        // لغة وافتراضيات
        const currentLang = localStorage.getItem('lang') || 'ar';
        const langLabel = document.getElementById('langLabel');
        if(langLabel) langLabel.innerText = currentLang === 'ar' ? 'English' : 'العربية';
        
        // تشغيل الترجمة بمجرد فتح الصفحة
        if(window.applyLanguage) applyLanguage(currentLang);
    </script>
</body>
</html>
