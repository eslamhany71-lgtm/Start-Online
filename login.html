<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | Start Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: #f1f5f9;
            font-family: 'Cairo', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body>

    <div class="w-full max-w-md p-8 glass rounded-[40px] shadow-2xl mx-4">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black mb-2">START<span class="text-blue-400">ONLINE</span></h1>
            <p id="authSubtitle" class="text-gray-400">سجل دخولك للوصول إلى لوحة التحكم</p>
        </div>

        <!-- Form -->
        <form id="authForm" class="space-y-6">
            <div id="nameField" class="hidden">
                <label class="block text-xs font-bold mb-2 mr-2 text-gray-300">الاسم الكامل</label>
                <input type="text" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:outline-none focus:border-blue-500 transition-all text-sm">
            </div>
            <div>
                <label class="block text-xs font-bold mb-2 mr-2 text-gray-300">البريد الإلكتروني</label>
                <input type="email" required class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:outline-none focus:border-blue-500 transition-all text-sm" placeholder="example@mail.com">
            </div>
            <div>
                <label class="block text-xs font-bold mb-2 mr-2 text-gray-300">كلمة المرور</label>
                <input type="password" required class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:outline-none focus:border-blue-500 transition-all text-sm" placeholder="••••••••">
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl shadow-lg shadow-blue-500/20 transition-all transform hover:-translate-y-1">
                <span id="btnText">تسجيل الدخول</span>
            </button>
        </form>

        <div class="mt-8 text-center text-sm">
            <span id="toggleText" class="text-gray-400">ليس لديك حساب؟</span>
            <button onclick="toggleAuth()" class="text-blue-400 font-bold mr-1 underline">إنشاء حساب جديد</button>
        </div>

        <div class="mt-6 text-center">
            <a href="index.html" class="text-xs text-gray-500 hover:text-white transition">العودة للرئيسية</a>
        </div>
    </div>

    <script>
        let isLogin = true;

        function toggleAuth() {
            isLogin = !isLogin;
            const nameField = document.getElementById('nameField');
            const btnText = document.getElementById('btnText');
            const authSubtitle = document.getElementById('authSubtitle');
            const toggleText = document.getElementById('toggleText');

            if(!isLogin) {
                nameField.classList.remove('hidden');
                btnText.innerText = "إنشاء الحساب";
                authSubtitle.innerText = "انضم إلينا كمسوق أو مشتري";
                toggleText.innerText = "لديك حساب بالفعل؟";
            } else {
                nameField.classList.add('hidden');
                btnText.innerText = "تسجيل الدخول";
                authSubtitle.innerText = "سجل دخولك للوصول إلى لوحة التحكم";
                toggleText.innerText = "ليس لديك حساب؟";
            }
        }

        document.getElementById('authForm').onsubmit = (e) => {
            e.preventDefault();
            // هنا مستقبلاً هنربط بالـ Firebase
            alert("تم تسجيل الدخول بنجاح (نسخة تجريبية)");
            window.location.href = "products.html";
        };
    </script>
</body>
</html>
