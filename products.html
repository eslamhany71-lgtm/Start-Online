<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المتجر الذكي | Start Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); color: #f1f5f9; font-family: 'Cairo', sans-serif; min-height: 100vh; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .product-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .product-card:hover { transform: translateY(-10px); background: rgba(255, 255, 255, 0.06); border-color: rgba(59, 130, 246, 0.3); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="pb-20">

    <!-- Navbar -->
    <nav class="fixed top-0 left-0 right-0 z-50 p-4 md:p-6">
        <div class="max-w-7xl mx-auto glass rounded-2xl px-6 py-4 flex justify-between items-center shadow-2xl">
            <div class="flex items-center gap-8">
                <div class="text-xl font-black text-white">
                    <a href="index.html">START<span class="text-blue-400">ONLINE</span></a>
                </div>
                <ul class="hidden md:flex gap-6 text-xs font-bold text-gray-400">
                    <li><a href="index.html" class="hover:text-white transition">الرئيسية</a></li>
                    <li><a href="products.html" class="text-blue-400 font-black underline decoration-2 underline-offset-8">المتجر</a></li>
                </ul>
            </div>
            
            <div class="flex items-center gap-4">
                <div id="userInfo" class="hidden md:block text-[10px] font-bold text-gray-300 bg-white/5 px-4 py-2 rounded-full border border-white/5">جاري التحميل...</div>
                <button onclick="logout()" class="flex items-center gap-2 bg-red-500/10 hover:bg-red-500 border border-red-500/20 px-4 py-2 rounded-xl text-[10px] font-bold text-red-500 hover:text-white transition-all">خروج</button>
            </div>
        </div>
    </nav>

    <div class="pt-32"></div>

    <!-- البحث والمفضلة -->
    <section class="max-w-7xl mx-auto px-6 mb-12">
        <div class="flex flex-col md:flex-row gap-4 items-center justify-between glass p-4 rounded-3xl">
            <div class="relative w-full md:w-1/2">
                <input type="text" id="searchInput" oninput="filterProducts()" placeholder="ابحث عن منتج..." class="w-full bg-white/5 border border-white/10 p-4 pr-12 rounded-2xl outline-none focus:border-blue-500 text-sm text-white">
                <svg class="absolute right-4 top-4 text-gray-500" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            </div>
            <button onclick="loadWishlistOnly()" class="bg-pink-500/10 text-pink-500 px-6 py-4 rounded-2xl text-xs font-bold border border-pink-500/20 hover:bg-pink-500 hover:text-white transition-all">عرض المفضلة ❤</button>
        </div>
    </section>

    <!-- لوحة إدارة المستخدمين (أدمن فقط) -->
    <section id="adminUsersPanel" class="max-w-7xl mx-auto mb-10 p-8 glass rounded-[35px] hidden border-yellow-500/20 border">
        <h2 class="text-xl font-black mb-6 text-yellow-500 italic uppercase tracking-tighter">إدارة صلاحيات المستخدمين</h2>
        <div id="usersList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </section>

    <!-- لوحة إدارة المنتجات (مسوق وأدمن) -->
    <section id="controlPanel" class="max-w-4xl mx-auto p-8 glass rounded-[35px] hidden mb-12 border-blue-500/10 border shadow-2xl">
        <h2 id="panelTitle" class="text-2xl font-black mb-6 text-blue-400">إدارة المنتجات</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <input type="text" id="pName" placeholder="اسم المنتج" class="bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500 text-sm">
            <input type="number" id="pPrice" placeholder="السعر ($)" class="bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500 text-sm">
            <input type="text" id="pImage" placeholder="رابط الصورة" class="bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500 text-sm">
        </div>
        <button onclick="saveProduct()" class="w-full mt-6 bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl transition-all">نشر المنتج</button>
    </section>

    <!-- عرض المنتجات -->
    <main class="max-w-7xl mx-auto px-6">
        <div id="productsGrid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyypXt8LnHiVBR2Ka0Mb8ntXu6dJH9N-w",
            authDomain: "start-online-6f460.firebaseapp.com",
            projectId: "start-online-6f460",
            databaseURL: "https://start-online-6f460-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentUser = null;
        let userRole = 'customer';
        let allProducts = {};
        let userWishlist = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userSnap = await get(ref(db, 'users/' + user.uid));
                if (userSnap.exists()) {
                    const userData = userSnap.val();
                    userRole = userData.role;
                    userWishlist = userData.wishlist || [];
                    document.getElementById('userInfo').innerText = `${userData.name} | ${userRole.toUpperCase()}`;
                    
                    if (userRole === 'admin' || userRole === 'marketer') {
                        document.getElementById('controlPanel').classList.remove('hidden');
                        if (userRole === 'admin') {
                            document.getElementById('adminUsersPanel').classList.remove('hidden');
                            loadUsers();
                        }
                    }
                }
                loadProducts();
            } else { window.location.href = "login.html"; }
        });

  // إدارة المستخدمين (للأدمن) - النسخة الكاملة
        function loadUsers() {
            onValue(ref(db, 'users'), (snapshot) => {
                const users = snapshot.val();
                const list = document.getElementById('usersList'); 
                list.innerHTML = ''; // مسح القائمة قبل إعادة الرسم
                if(users) {
                    Object.keys(users).forEach(uid => {
                        const u = users[uid];
                        list.innerHTML += `
                            <div class="bg-white/5 p-4 rounded-2xl border border-white/5 flex flex-col gap-2">
                                <div class="flex justify-between items-start">
                                    <p class="font-bold text-sm text-white">${u.name}</p>
                                    <span class="text-[9px] px-2 py-0.5 rounded-full bg-blue-500/10 text-blue-400 font-black uppercase">${u.role}</span>
                                </div>
                                <p class="text-[10px] text-gray-500 mb-2">${u.email}</p>
                                <div class="flex gap-1">
                                    <!-- زر ترقية لمسوق -->
                                    <button onclick="changeRole('${uid}', 'marketer')" class="flex-1 text-[8px] bg-blue-600/20 hover:bg-blue-600 text-blue-400 hover:text-white p-2 rounded-lg transition-all">مسوق</button>
                                    
                                    <!-- زر ترقية لأدمن -->
                                    <button onclick="changeRole('${uid}', 'admin')" class="flex-1 text-[8px] bg-yellow-600/20 hover:bg-yellow-600 text-yellow-500 hover:text-white p-2 rounded-lg transition-all">أدمن</button>
                                    
                                    <!-- زر إرجاع لعميل -->
                                    <button onclick="changeRole('${uid}', 'customer')" class="flex-1 text-[8px] bg-gray-600/20 hover:bg-gray-400 text-gray-400 hover:text-white p-2 rounded-lg transition-all">عميل</button>
                                </div>
                            </div>
                        `;
                    });
                }
            });
        }
        window.changeRole = (uid, r) => update(ref(db, 'users/' + uid), { role: r });

        // إضافة منتج
        window.saveProduct = () => {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const image = document.getElementById('pImage').value || 'https://via.placeholder.com/400';
            if(name && price) {
                push(ref(db, 'products'), { name, price, image, owner: currentUser.uid });
                document.getElementById('pName').value = ''; document.getElementById('pPrice').value = '';
            }
        };

        // حذف وتعديل المنتجات
        window.deleteProduct = (id) => confirm("حذف المنتج؟") && remove(ref(db, 'products/' + id));
        
        window.editProduct = (id, oldName, oldPrice) => {
            const newName = prompt("الاسم الجديد:", oldName);
            const newPrice = prompt("السعر الجديد:", oldPrice);
            if(newName && newPrice) update(ref(db, 'products/' + id), { name: newName, price: newPrice });
        };

        // الانتقال للتفاصيل
        window.viewDetails = (id, name, price, image) => {
            window.location.href = `details.html?id=${id}&name=${encodeURIComponent(name)}&price=${price}&image=${encodeURIComponent(image)}`;
        };

        // نظام المفضلة
        window.toggleWishlist = async (id) => {
            const index = userWishlist.indexOf(id);
            if (index > -1) userWishlist.splice(index, 1); else userWishlist.push(id);
            await update(ref(db, 'users/' + currentUser.uid), { wishlist: userWishlist });
            renderGrid(allProducts);
        };

        // محرك البحث
        window.filterProducts = () => {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = {};
            Object.keys(allProducts).forEach(key => {
                if(allProducts[key].name.toLowerCase().includes(term)) filtered[key] = allProducts[key];
            });
            renderGrid(filtered);
        };

        window.loadWishlistOnly = () => {
            const filtered = {};
            Object.keys(allProducts).forEach(key => {
                if(userWishlist.includes(key)) filtered[key] = allProducts[key];
            });
            renderGrid(filtered);
        };

        function loadProducts() {
            onValue(ref(db, 'products'), (snapshot) => {
                allProducts = snapshot.val() || {};
                renderGrid(allProducts);
            });
        }

        function renderGrid(products) {
            const grid = document.getElementById('productsGrid'); grid.innerHTML = '';
            Object.keys(products).forEach(key => {
                const p = products[key];
                const isSaved = userWishlist.includes(key);
                const canManage = (userRole === 'admin') || (userRole === 'marketer' && p.owner === currentUser.uid);
                grid.innerHTML += `
                    <div class="product-card glass p-5 rounded-[30px] border border-white/5 relative group">
                        <button onclick="toggleWishlist('${key}')" class="absolute top-4 left-4 z-10 p-2 rounded-full backdrop-blur-md ${isSaved ? 'text-pink-500 bg-pink-500/10' : 'text-gray-400 bg-black/20'} transition-all">❤</button>
                        <img src="${p.image}" class="w-full h-44 object-cover rounded-2xl mb-4 shadow-xl">
                        <h3 class="font-bold text-lg mb-1">${p.name}</h3>
                        <div class="flex justify-between items-center">
                            <span class="text-blue-400 font-black text-2xl">$${p.price}</span>
                            ${canManage ? `
                                <div class="flex gap-2">
                                    <button onclick="editProduct('${key}', '${p.name}', '${p.price}')" class="p-2 bg-yellow-500/10 text-yellow-500 rounded-lg text-[10px]">✎</button>
                                    <button onclick="deleteProduct('${key}')" class="p-2 bg-red-500/10 text-red-500 rounded-lg text-[10px]">✕</button>
                                </div>
                            ` : ''}
                        </div>
                        <button onclick="viewDetails('${key}', '${p.name}', '${p.price}', '${p.image}')" class="w-full mt-5 bg-white/5 hover:bg-white hover:text-black py-3 rounded-2xl text-[11px] font-black transition-all">التفاصيل / التقييم</button>
                    </div>
                `;
            });
        }

        window.logout = () => signOut(auth).then(() => window.location.href = "login.html");
    </script>
</body>
</html>
