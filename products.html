<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><title>المتجر | Start Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); color: #f1f5f9; font-family: 'Cairo', sans-serif; min-height: 100vh; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
    </style>
</head>
<body class="pb-20">

    <!-- Navbar -->
    <nav class="fixed top-0 left-0 right-0 z-50 p-4 md:p-6">
        <div class="max-w-7xl mx-auto glass rounded-2xl px-6 py-4 flex justify-between items-center shadow-2xl">
            <div class="flex items-center gap-8">
                <div class="text-xl font-black text-white"><a href="index.html">START<span class="text-blue-400">ONLINE</span></a></div>
                <ul class="hidden md:flex gap-6 text-xs font-bold text-gray-400">
                    <li><a href="index.html" class="hover:text-white transition">الرئيسية</a></li>
                    <li><a href="products.html" class="text-blue-400 font-black underline underline-offset-8">المتجر</a></li>
                </ul>
            </div>
            <div class="flex items-center gap-4">
                <div id="userInfo" class="hidden md:block text-[10px] font-bold text-gray-300 bg-white/5 px-4 py-2 rounded-full border border-white/5 tracking-widest uppercase">جاري التحقق...</div>
                <button onclick="logout()" class="flex items-center gap-2 bg-red-500/10 hover:bg-red-500 border border-red-500/20 px-4 py-2 rounded-xl text-[10px] font-bold text-red-500 hover:text-white transition-all">تسجيل الخروج</button>
            </div>
        </div>
    </nav>

    <div class="pt-32"></div>

    <!-- لوحة إدارة الأعضاء (للأدمن فقط) -->
    <section id="adminUsersPanel" class="max-w-4xl mx-auto mb-10 p-8 glass rounded-[35px] hidden border-yellow-500/20 border">
        <h2 class="text-xl font-black mb-6 text-yellow-500">إدارة صلاحيات المستخدمين (أدمن فقط)</h2>
        <div id="usersList" class="space-y-4">
            <!-- قائمة المستخدمين هتظهر هنا -->
        </div>
    </section>

    <!-- لوحة إدارة المنتجات (للمسوق والأدمن) -->
    <section id="controlPanel" class="max-w-4xl mx-auto p-8 glass rounded-[35px] hidden mb-12 border-blue-500/10 border shadow-2xl">
        <h2 id="panelTitle" class="text-2xl font-black mb-6 italic text-blue-400">إدارة المنتجات</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <input type="text" id="pName" placeholder="اسم المنتج" class="bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500 text-sm text-white">
            <input type="number" id="pPrice" placeholder="السعر ($)" class="bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500 text-sm text-white">
            <input type="text" id="pImage" placeholder="رابط الصورة" class="bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500 text-sm text-white">
        </div>
        <button onclick="saveProduct()" class="w-full mt-6 bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl shadow-xl shadow-blue-500/20 transition-all">نشر المنتج</button>
    </section>

    <!-- عرض المنتجات -->
    <main class="max-w-7xl mx-auto px-6">
        <div id="productsGrid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyypXt8LnHiVBR2Ka0Mb8ntXu6dJH9N-w",
            authDomain: "start-online-6f460.firebaseapp.com",
            projectId: "start-online-6f460",
            databaseURL: "https://start-online-6f460-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentUser = null;
        let userRole = 'customer';

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const snapshot = await get(ref(db, 'users/' + user.uid));
                if (snapshot.exists()) {
                    userRole = snapshot.val().role;
                    document.getElementById('userInfo').innerText = `${snapshot.val().name} | ${userRole.toUpperCase()}`;
                    
                    if (userRole === 'admin' || userRole === 'marketer') {
                        document.getElementById('controlPanel').classList.remove('hidden');
                        if (userRole === 'admin') {
                            document.getElementById('adminUsersPanel').classList.remove('hidden');
                            loadUsers();
                        }
                    }
                }
                loadProducts();
            } else { window.location.href = "login.html"; }
        });

        // لوحة الأدمن: تحميل المستخدمين وتغيير رتبهم
        function loadUsers() {
            onValue(ref(db, 'users'), (snapshot) => {
                const users = snapshot.val();
                const list = document.getElementById('usersList');
                list.innerHTML = '';
                Object.keys(users).forEach(uid => {
                    const u = users[uid];
                    list.innerHTML += `
                        <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/5">
                            <div>
                                <p class="font-bold text-sm text-white">${u.name} <span class="text-xs text-gray-500">(${u.email})</span></p>
                                <p class="text-[10px] text-blue-400 uppercase">الرتبة الحالية: ${u.role}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="changeRole('${uid}', 'marketer')" class="text-[10px] bg-blue-500/20 text-blue-400 px-3 py-1 rounded-lg">ترقية لمسوق</button>
                                <button onclick="changeRole('${uid}', 'admin')" class="text-[10px] bg-yellow-500/20 text-yellow-500 px-3 py-1 rounded-lg">ترقية لأدمن</button>
                                <button onclick="changeRole('${uid}', 'customer')" class="text-[10px] bg-gray-500/20 text-gray-400 px-3 py-1 rounded-lg">عميل فقط</button>
                            </div>
                        </div>
                    `;
                });
            });
        }

        window.changeRole = (uid, newRole) => {
            update(ref(db, 'users/' + uid), { role: newRole });
        };

        window.saveProduct = () => {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const image = document.getElementById('pImage').value || 'https://via.placeholder.com/400';
            if(name && price) {
                const newRef = push(ref(db, 'products'));
                set(newRef, { name, price, image, owner: currentUser.uid });
                document.getElementById('pName').value = ''; document.getElementById('pPrice').value = '';
            }
        };

        window.deleteProduct = (id) => confirm("حذف المنتج؟") && remove(ref(db, 'products/' + id));
        window.editProduct = (id, n, p) => {
            const nn = prompt("الاسم الجديد:", n);
            const np = prompt("السعر الجديد:", p);
            if(nn && np) update(ref(db, 'products/' + id), { name: nn, price: np });
        };

        window.viewDetails = (name, price, image) => window.location.href = `details.html?name=${encodeURIComponent(name)}&price=${price}&image=${encodeURIComponent(image)}`;

        function loadProducts() {
            onValue(ref(db, 'products'), (snapshot) => {
                const data = snapshot.val();
                const grid = document.getElementById('productsGrid');
                grid.innerHTML = '';
                if(data) {
                    Object.keys(data).forEach(key => {
                        const p = data[key];
                        const canManage = (userRole === 'admin') || (userRole === 'marketer' && p.owner === currentUser.uid);
                        grid.innerHTML += `
                            <div class="glass p-5 rounded-[30px] border border-white/5">
                                <img src="${p.image}" class="w-full h-44 object-cover rounded-2xl mb-4">
                                <h3 class="font-bold text-lg mb-1">${p.name}</h3>
                                <div class="flex justify-between items-center">
                                    <span class="text-blue-400 font-black text-2xl">$${p.price}</span>
                                    ${canManage ? `<div class="flex gap-2"><button onclick="editProduct('${key}', '${p.name}', '${p.price}')" class="p-2 bg-yellow-500/10 text-yellow-500 rounded-lg">✎</button><button onclick="deleteProduct('${key}')" class="p-2 bg-red-500/10 text-red-500 rounded-lg">✕</button></div>` : ''}
                                </div>
                                <button onclick="viewDetails('${p.name}', '${p.price}', '${p.image}')" class="w-full mt-5 bg-white/5 hover:bg-white hover:text-black py-3 rounded-2xl text-[11px] font-black transition-all">شراء الآن</button>
                            </div>
                        `;
                    });
                }
            });
        }
        window.logout = () => signOut(auth).then(() => window.location.href = "login.html");
    </script>
</body>
</html>
