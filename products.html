<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><title>المتجر الاحترافي | Start Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); color: #f1f5f9; font-family: 'Cairo', sans-serif; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="pb-20">

    <nav class="p-6">
        <div class="max-w-7xl mx-auto glass rounded-2xl px-8 py-4 flex justify-between items-center">
            <div class="text-xl font-black text-white">START<span class="text-blue-400">ONLINE</span></div>
            <div id="userInfo" class="text-xs font-bold text-blue-300">جاري التحقق...</div>
            <button onclick="logout()" class="text-xs text-red-400 underline">تسجيل خروج</button>
        </div>
    </nav>

    <!-- لوحة التحكم (تظهر للمسوق والأدمن فقط) -->
    <section id="controlPanel" class="max-w-4xl mx-auto mt-10 p-8 glass rounded-3xl hidden">
        <h2 id="panelTitle" class="text-2xl font-black mb-6 italic text-blue-400">إدارة المنتجات</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <input type="text" id="pName" placeholder="اسم المنتج" class="bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-blue-500">
            <input type="number" id="pPrice" placeholder="السعر ($)" class="bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-blue-500">
            <input type="text" id="pImage" placeholder="رابط الصورة" class="bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-blue-500">
        </div>
        <button id="btnAction" onclick="saveProduct()" class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition">إضافة المنتج للمتجر</button>
    </section>

    <main class="max-w-7xl mx-auto px-6 mt-16 text-center">
        <h1 class="text-4xl font-black mb-10">المعرض السحابي</h1>
        <div id="productsGrid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyypXt8LnHiVBR2Ka0Mb8ntXu6dJH9N-w",
            authDomain: "start-online-6f460.firebaseapp.com",
            projectId: "start-online-6f460",
            databaseURL: "https://start-online-6f460-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentUser = null;
        let userRole = 'customer';

        // التحقق من الرتبة والصلاحيات
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const snapshot = await get(ref(db, 'users/' + user.uid));
                if (snapshot.exists()) {
                    userRole = snapshot.val().role;
                    document.getElementById('userInfo').innerText = `مرحباً: ${snapshot.val().name} (${userRole})`;
                    
                    if (userRole === 'admin' || userRole === 'marketer') {
                        document.getElementById('controlPanel').classList.remove('hidden');
                        if(userRole === 'admin') document.getElementById('panelTitle').innerText = "لوحة المدير العام";
                    }
                }
                loadProducts();
            } else {
                window.location.href = "login.html";
            }
        });

        // إضافة منتج
        window.saveProduct = function() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const image = document.getElementById('pImage').value || 'https://via.placeholder.com/300';
            if(name && price) {
                const newRef = push(ref(db, 'products'));
                set(newRef, { name, price, image, owner: currentUser.uid });
                document.getElementById('pName').value = ''; document.getElementById('pPrice').value = '';
            }
        };

        // حذف منتج (للأدمن دائماً، وللمسوق لمنتجاته فقط)
        window.deleteProduct = (id) => { if(confirm("هل تريد حذف هذا المنتج؟")) remove(ref(db, 'products/' + id)); };

        // تعديل منتج
        window.editProduct = (id, oldName, oldPrice) => {
            const newName = prompt("الاسم الجديد:", oldName);
            const newPrice = prompt("السعر الجديد:", oldPrice);
            if(newName && newPrice) update(ref(db, 'products/' + id), { name: newName, price: newPrice });
        };

        function loadProducts() {
            onValue(ref(db, 'products'), (snapshot) => {
                const data = snapshot.val();
                const grid = document.getElementById('productsGrid');
                grid.innerHTML = '';
                if(data) {
                    Object.keys(data).forEach(key => {
                        const p = data[key];
                        // تحديد من يمكنه المسح والتعديل
                        const canManage = (userRole === 'admin') || (userRole === 'marketer' && p.owner === currentUser.uid);
                        
                        grid.innerHTML += `
                            <div class="glass p-4 rounded-3xl border border-white/5 relative overflow-hidden group">
                                <img src="${p.image}" class="w-full h-40 object-cover rounded-2xl mb-4">
                                <h3 class="font-bold text-lg">${p.name}</h3>
                                <div class="flex justify-between items-center mt-2">
                                    <span class="text-blue-400 font-black text-xl">$${p.price}</span>
                                    ${canManage ? `
                                        <div class="flex gap-2">
                                            <button onclick="editProduct('${key}', '${p.name}', '${p.price}')" class="text-[10px] bg-yellow-600/20 text-yellow-500 p-1 rounded">تعديل</button>
                                            <button onclick="deleteProduct('${key}')" class="text-[10px] bg-red-600/20 text-red-500 p-1 rounded">حذف</button>
                                        </div>
                                    ` : ''}
                                </div>
                                <button class="w-full mt-4 bg-white/10 hover:bg-blue-600 py-2 rounded-xl text-xs font-bold transition">شراء الآن</button>
                            </div>
                        `;
                    });
                }
            });
        }

        window.logout = () => signOut(auth).then(() => window.location.href = "login.html");
    </script>
</body>
</html>
