<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script src="translations.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المتجر الذكي | Start Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); color: #f1f5f9; font-family: 'Cairo', sans-serif; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .product-card { transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); position: relative; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.05); }
        .product-card:hover { transform: translateY(-15px) scale(1.03); background: rgba(255, 255, 255, 0.08); border-color: rgba(59, 130, 246, 0.6); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 30px rgba(59, 130, 246, 0.2); }
        
        /* التصنيفات المتفرعة */
        .category-item { flex: 0 0 auto; width: 90px; text-align: center; cursor: pointer; transition: 0.4s; }
        .category-item img { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.1); transition: 0.4s; margin: 0 auto 8px; }
        .category-item:hover img { border-color: #3b82f6; transform: scale(1.1); }
        .category-item.active img { border-color: #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        .category-item span { font-size: 11px; font-weight: 900; color: #94a3b8; }

        .sub-cats-container { display: none; width: 100%; justify-content: center; gap: 20px; margin-top: 15px; animation: fadeIn 0.5s ease; }
        .sub-cats-container.active { display: flex; }
        .sub-item { cursor: pointer; text-align: center; transition: 0.3s; }
        .sub-item img { width: 50px; height: 50px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 5px; }
        .sub-item:hover img { border-color: #3b82f6; transform: translateY(-3px); }
        .sub-item span { font-size: 10px; font-weight: bold; color: #64748b; }

        .stat-card { background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(255, 255, 255, 0.02)); border: 1px solid rgba(255,255,255,0.05); transition: 0.4s; cursor: pointer; }
        .stat-card:hover { transform: scale(1.05); border-color: #3b82f6; }

        /* توهج أزرار الرتب */
        .btn-role { transition: 0.4s; border: 1px solid rgba(255,255,255,0.05); }
        .btn-admin:hover { background: #eab308; color: black; box-shadow: 0 0 20px rgba(234, 179, 8, 0.6); }
        .btn-marketer:hover { background: #3b82f6; color: white; box-shadow: 0 0 20px rgba(59, 130, 246, 0.6); }
        .btn-customer:hover { background: #64748b; color: white; box-shadow: 0 0 20px rgba(100, 116, 139, 0.6); }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="pb-24">

    <!-- Navbar العلوي -->
    <nav class="fixed top-0 left-0 right-0 z-50 p-2 md:p-6">
        <div class="max-w-7xl mx-auto glass rounded-xl md:rounded-2xl px-4 md:px-8 py-3 md:py-4 flex justify-between items-center shadow-2xl border border-white/5">
            <div class="text-lg md:text-2xl font-black text-white"><a href="index.html">START<span class="text-blue-400">ONLINE</span></a></div>
            <ul class="hidden md:flex gap-8 font-bold text-sm text-gray-400">
                <li><a href="index.html" class="hover:text-white transition">الرئيسية</a></li>
                <li><a href="products.html" class="text-blue-400 font-black underline underline-offset-8">المتجر</a></li>
                <li><a href="profile.html" class="hover:text-white transition">حسابي</a></li>
            </ul>
            <div class="flex items-center gap-2">
                <div id="userInfo" class="hidden lg:block text-[10px] font-bold text-gray-400 bg-white/5 px-3 py-1 rounded-full">تحقق...</div>
                <button onclick="logout()" class="bg-red-500/10 text-red-500 px-3 md:px-4 py-2 rounded-lg text-[10px] font-bold border border-red-500/20">خروج</button>
            </div>
        </div>
    </nav>

    <!-- Navbar السفلي (ستايل الصفحة الرئيسية) -->
    <nav class="fixed bottom-4 left-4 right-4 z-50 md:hidden">
        <div class="glass rounded-[25px] p-2 flex justify-around items-center border border-white/10 shadow-[0_0_30px_rgba(0,0,0,0.5)] backdrop-blur-2xl">
            <a href="index.html" class="flex flex-col items-center gap-1 text-[10px] text-gray-400 p-2"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>الرئيسية</span></a>
            <a href="products.html" class="flex flex-col items-center gap-1 text-[10px] text-blue-400 p-2"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/></svg><span>المتجر</span></a>
            <a href="profile.html" class="flex flex-col items-center gap-1 text-[10px] text-gray-400 p-2"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>حسابي</span></a>
        </div>
    </nav>

    <div class="pt-24 md:pt-32"></div>

    <!-- شريط التصنيفات المطور -->
    <section class="max-w-7xl mx-auto px-4 mb-10 overflow-x-auto no-scrollbar">
        <div class="flex gap-6 pb-2 justify-start md:justify-center" id="categoriesBar">
            <div class="category-item active" onclick="toggleSub('all', this)"><img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=200"><span>الكل</span></div>
            <div class="category-item" onclick="toggleSub('clothes', this)"><img src="https://images.unsplash.com/photo-1620799140408-edc6dcb6d633?w=200"><span>ملابس</span></div>
            <div class="category-item" onclick="toggleSub('acc', this)"><img src="https://jlood.com/cdn/shop/files/Men_Accessories_in_Egypt2_large.jpg"><span>إكسسوارات</span></div>
            <div class="category-item" onclick="toggleSub('perfume', this)"><img src="https://images.unsplash.com/photo-1541643600914-78b084683601?w=200"><span>عطور</span></div>
            <div class="category-item" onclick="toggleSub('beauty', this)"><img src="https://cdn.youcan.shop/stores/0dc0cbcb1b32177428c303a8e891bc1e/products/ekcrAIzCdbM7DYOPYwqrxERfMKBM01UitNaY2FfO_md.png"><span>صحة وجمال</span></div>
            <div class="category-item" onclick="toggleSub('best', this)"><img src="https://images.unsplash.com/photo-1555529669-e69e7aa0ba9a?w=200"><span>أكثر مبيعاً</span></div>
        </div>
        
        <!-- الفروع تحت الأيقونات -->
        <div id="subCatsArea" class="sub-cats-container"></div>
    </section>

    <!-- داشبورد الإحصائيات التفاعلي -->
    <section id="adminStats" class="max-w-7xl mx-auto px-4 mb-10 hidden grid grid-cols-2 md:grid-cols-5 gap-4 animate-fade-in">
        <div class="stat-card p-4 rounded-3xl text-center" onclick="showUsersList('all')"><p class="text-[9px] text-gray-500 uppercase font-black">المستخدمين</p><h3 id="totalUsers" class="text-xl font-black text-blue-400">0</h3></div>
        <div class="stat-card p-4 rounded-3xl text-center"><p class="text-[9px] text-gray-500 uppercase font-black">المنتجات</p><h3 id="totalProducts" class="text-xl font-black text-green-400">0</h3></div>
        <div class="stat-card p-4 rounded-3xl text-center" onclick="showUsersList('marketer')"><p class="text-[9px] text-gray-500 uppercase font-black">المسوقين</p><h3 id="totalMarketers" class="text-xl font-black text-purple-400">0</h3></div>
        <div class="stat-card p-4 rounded-3xl text-center" onclick="showUsersList('customer')"><p class="text-[9px] text-gray-500 uppercase font-black">العملاء</p><h3 id="totalCustomers" class="text-xl font-black text-pink-400">0</h3></div>
        <div class="stat-card p-4 rounded-3xl text-center"><p class="text-[9px] text-gray-500 uppercase font-black">التقييمات</p><h3 id="totalReviews" class="text-xl font-black text-yellow-400">0</h3></div>
    </section>

    <!-- طلبات الانضمام -->
    <section id="marketerRequestsPanel" class="max-w-7xl mx-auto mb-10 px-4 hidden animate-fade-in">
        <div class="glass p-6 rounded-[35px] border border-blue-500/20 shadow-2xl">
            <h2 class="text-lg font-black mb-6 text-blue-400 italic">طلبات انضمام مسوقين جدد</h2>
            <div id="requestsList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </section>

    <!-- البحث والعودة للكل -->
    <section class="max-w-7xl mx-auto px-4 mb-10 flex flex-col md:flex-row gap-4">
        <input type="text" id="searchInput" oninput="filterProducts()" placeholder="ابحث في المتجر..." class="flex-1 bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500 text-sm text-white">
        <div class="flex gap-2">
            <button onclick="loadWishlistOnly()" class="bg-pink-500/10 text-pink-500 px-6 py-4 rounded-2xl text-xs font-bold border border-pink-500/20">مفضلاتي ❤</button>
            <button onclick="renderGrid(allProducts)" class="bg-white/5 text-gray-400 px-6 py-4 rounded-2xl text-xs font-bold border border-white/10 hover:bg-white hover:text-black transition-all">الكل</button>
        </div>
    </section>

    <!-- إدارة كافة الأعضاء -->
    <section id="adminUsersPanel" class="max-w-7xl mx-auto mb-10 px-4 hidden glass rounded-[35px] p-6 border border-white/10">
        <h2 class="text-xl font-black mb-6 text-gray-400 italic">إدارة الصلاحيات</h2>
        <div id="usersList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </section>

    <!-- إضافة منتج (الفورم العملاق) -->
    <section id="controlPanel" class="max-w-5xl mx-auto px-4 mb-12 hidden animate-fade-in">
        <div class="glass p-8 rounded-[40px] border border-blue-500/10 shadow-2xl">
            <h2 class="text-2xl font-black mb-8 text-blue-400 italic underline tracking-tighter">نشر إبداع جديد بالتفاصيل الكاملة</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <input type="text" id="pName" placeholder="اسم المنتج" class="bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-xs text-white">
                <select id="pCategory" class="bg-slate-800 border border-white/10 p-4 rounded-2xl outline-none text-xs text-white">
                    <option value="ملابس">ملابس</option><option value="إكسسوارات">إكسسوارات</option><option value="عطور">عطور</option><option value="صحة وجمال">صحة وجمال</option>
                </select>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                <select id="pSubCategory" class="bg-slate-800 border border-white/10 p-4 rounded-2xl outline-none text-[10px] text-white"><option value="رجالي">رجالي</option><option value="حريمي">حريمي</option><option value="عام">عام</option></select>
                <input type="number" id="pPrice" placeholder="السعر النهائي ($)" class="bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-xs text-white">
                <input type="number" id="pOldPrice" placeholder="قبل الخصم ($)" class="bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-xs text-white">
                <input type="text" id="pModel" placeholder="الموديل" class="bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-xs text-white">
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <input type="text" id="pMaterial" placeholder="الماتريال" class="bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-xs text-white">
                <input type="text" id="pColors" placeholder="الألوان المتاحة" class="bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-xs text-white">
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <input type="text" id="pSizes" placeholder="المقاسات" class="bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-xs text-white">
                <input type="text" id="pImage" placeholder="رابط الصورة الأساسية" class="bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-xs text-white">
            </div>
            <input type="text" id="pExtraImages" placeholder="روابط صور الألوان (افصل بفاصلة ,)" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-xs text-white mb-4">
            <textarea id="pDesc" placeholder="وصف المنتج..." class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-xs text-white h-24 mb-4"></textarea>
            <button onclick="saveProduct()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-3xl shadow-xl transition-all">تأكيد النشر</button>
        </div>
    </section>

    <!-- Modal عرض القائمة -->
    <div id="usersModal" class="fixed inset-0 bg-black/95 z-[100] hidden items-center justify-center p-6">
        <div class="glass w-full max-w-2xl p-8 rounded-[40px] border border-white/10 relative overflow-hidden">
            <button onclick="closeModal()" class="absolute top-6 left-6 text-gray-500 hover:text-white font-black">✕</button>
            <h2 id="modalTitle" class="text-xl font-black mb-6 text-blue-400 italic">قائمة الأعضاء</h2>
            <div id="modalList" class="space-y-3 max-h-[450px] overflow-y-auto no-scrollbar"></div>
        </div>
    </div>

    <!-- المعرض -->
    <main class="max-w-7xl mx-auto px-4 md:px-6">
        <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, remove, update, get, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCyypXt8LnHiVBR2Ka0Mb8ntXu6dJH9N-w", authDomain: "start-online-6f460.firebaseapp.com", projectId: "start-online-6f460", databaseURL: "https://start-online-6f460-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getDatabase(app);

        let currentUser = null, userRole = 'customer', allProducts = {}, allUsers = {}, userWishlist = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userSnap = await get(ref(db, 'users/' + user.uid));
                if (userSnap.exists()) {
                    const u = userSnap.val(); userRole = u.role; userWishlist = u.wishlist || [];
                    document.getElementById('userInfo').innerText = `${u.name} | ${userRole.toUpperCase()}`;
                    if (userRole === 'admin' || userRole === 'marketer') {
                        document.getElementById('controlPanel').classList.remove('hidden');
                        if (userRole === 'admin') {
                            document.getElementById('adminStats').classList.remove('hidden');
                            document.getElementById('adminUsersPanel').classList.remove('hidden');
                            document.getElementById('marketerRequestsPanel').classList.remove('hidden');
                            loadAdminDashboard(); loadMarketerRequests(); loadUsers();
                        }
                    }
                }
                loadProducts();
            } else { window.location.href = "login.html"; }
        });

        // نظام الأيقونات المتفرعة
        const subMap = {
            clothes: [{n:'رجالي', i:'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTcq8MbpMpYi4h72YsWLGOu8L2bU7lNdq-3ZQ&s'}, {n:'حريمي', i:'https://images.unsplash.com/photo-1567401893414-76b7b1e5a7a5?w=100'}],
            acc: [{n:'رجالي', i:'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRHE6nx5A79B-M8Ptx1axoKtJyh__8fFnVf9Q&s'}, {n:'حريمي', i:'https:// blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg_2PO3OsO5EeG2It9AcKvUkfcraT1AzfcbFuB4c_RxtgsYzAPBUico99Z2PlxYnTKx4Rd0WlhLqoI6QpHR-IVSZsEXDQPij6CZY0eaoQ-tWvUO4PQrNOyYD_9CgZpLx6kUDFLBSBlP-f97/s1600/%D8%A7%D9%83%D8%B3%D8%B3%D9%88%D8%A7%D8%B1%D8%A7%D8%AA+%D9%85%D8%B3%D8%AA%D9%88%D8%B1%D8%AF%D8%A9+%D9%85%D9%86+%D8%A7%D9%84%D8%B5%D9%8A%D9%86.jpg'}],
            perfume: [{n:'رجالي', i:'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTqYTBqAT9RJHsyFI4Pbp1btFlcsx3YVcowXw&s'}, {n:'حريمي', i:'https://www.faces.eg/dw/image/v2/BJSM_PRD/on/demandware.static/-/Sites-faces-master-catalog/default/dw14914fb4/product/3614270175572/3614270175572.jpg?sw=800&sh=800'}],
            beauty: [{n:'رجالي', i:'https://images.unsplash.com/photo-1556228720-195a672e8a03?w=100'}, {n:'حريمي', i:'https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?w=100'}]
        };

        window.toggleSub = (key, el) => {
            document.querySelectorAll('.category-item').forEach(i => i.classList.remove('active')); el.classList.add('active');
            const area = document.getElementById('subCatsArea');
            if(key === 'all' || key === 'best') { area.classList.remove('active'); filterByCategory(key === 'all' ? 'الكل' : 'أكثر مبيعاً'); return; }
            area.classList.add('active');
            area.innerHTML = subMap[key].map(s => `
                <div class="sub-item" onclick="filterBySub('${s.n}')"><img src="${s.i}"><span>${s.n}</span></div>
            `).join('');
            filterByCategory(el.innerText.trim());
        };

        // إحصائيات
        function loadAdminDashboard() {
            onValue(ref(db, 'users'), (snap) => {
                allUsers = snap.val() || {};
                document.getElementById('totalUsers').innerText = Object.keys(allUsers).length;
                document.getElementById('totalMarketers').innerText = Object.values(allUsers).filter(u => u.role === 'marketer').length;
                document.getElementById('totalCustomers').innerText = Object.values(allUsers).filter(u => u.role === 'customer').length;
            });
            onValue(ref(db, 'products'), (s) => document.getElementById('totalProducts').innerText = Object.keys(s.val() || {}).length);
            onValue(ref(db, 'reviews'), (s) => { let c = 0; Object.values(s.val() || {}).forEach(r => c += Object.keys(r).length); document.getElementById('totalReviews').innerText = c; });
        }

        window.showUsersList = (role) => {
            const m = document.getElementById('usersModal'); const l = document.getElementById('modalList');
            m.style.display = 'flex'; l.innerHTML = '';
            Object.values(allUsers).forEach(u => {
                if(role === 'all' || u.role === role) {
                    l.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl border border-white/5 flex justify-between items-center"><div class="text-right"><p class="font-bold text-white uppercase">${u.name}</p><p class="text-[9px] text-gray-500">${u.email}</p></div><div class="text-blue-400 font-bold text-[9px]">${u.role.toUpperCase()}</div></div>`;
                }
            });
        };
        window.closeModal = () => document.getElementById('usersModal').style.display = 'none';

        function loadMarketerRequests() {
            onValue(ref(db, 'marketer_requests'), (snap) => {
                const list = document.getElementById('requestsList'); list.innerHTML = '';
                const data = snap.val(); if(data) { Object.keys(data).forEach(uid => { const r = data[uid]; list.innerHTML += `<div class="glass p-5 rounded-3xl flex justify-between items-center"><p class="font-bold text-sm text-white underline decoration-blue-500/30">${r.name}</p><button onclick="approveMarketer('${uid}')" class="bg-blue-600 text-white px-5 py-2 rounded-xl text-[10px] font-black">قبول</button></div>`; }); }
            });
        }
        window.approveMarketer = async (uid) => { await update(ref(db, 'users/' + uid), { role: 'marketer' }); await remove(ref(db, 'marketer_requests/' + uid)); };

        // حفظ وتعديل وحذف
        window.saveProduct = () => {
            const n = document.getElementById('pName').value, p = document.getElementById('pPrice').value;
            if(n && p) {
                push(ref(db, 'products'), {
                    name: n, price: p, oldPrice: document.getElementById('pOldPrice').value,
                    category: document.getElementById('pCategory').value, subCategory: document.getElementById('pSubCategory').value,
                    model: document.getElementById('pModel').value, material: document.getElementById('pMaterial').value,
                    colors: document.getElementById('pColors').value, sizes: document.getElementById('pSizes').value,
                    desc: document.getElementById('pDesc').value, image: document.getElementById('pImage').value || 'https://via.placeholder.com/400',
                    extraImages: document.getElementById('pExtraImages').value, owner: currentUser.uid, likes: 0
                });
                alert("تم النشر بنجاح!");
            }
        };

        window.editProduct = async (id, oldN, oldP, oldI) => {
            const nn = prompt("الاسم:", oldN), np = prompt("السعر:", oldP), ni = prompt("الصورة:", oldI);
            if(nn && np) await update(ref(db, 'products/' + id), { name: nn, price: np, image: ni });
        };
        window.deleteProduct = (id) => confirm("حذف نهائي؟") && remove(ref(db, 'products/' + id));

        function loadProducts() { onValue(ref(db, 'products'), (s) => { allProducts = s.val() || {}; renderGrid(allProducts); }); }

        function renderGrid(prods) {
            const grid = document.getElementById('productsGrid'); grid.innerHTML = '';
            Object.keys(prods).forEach(key => {
                const p = prods[key], isS = userWishlist.includes(key), canM = (userRole === 'admin') || (userRole === 'marketer' && p.owner === currentUser.uid);
                grid.innerHTML += `<div class="product-card glass p-5 rounded-[35px] animate-fade-in shadow-xl">
                    <div class="absolute top-5 left-5 flex flex-col items-center gap-1 z-10"><button onclick="toggleWishlist('${key}')" class="p-2.5 rounded-full backdrop-blur-md ${isS ? 'text-pink-500 bg-pink-500/10' : 'text-gray-400 bg-black/30'}">❤</button><span class="text-[10px] font-black text-gray-400">${p.likes || 0}</span></div>
                    <div class="w-full h-48 rounded-[25px] overflow-hidden mb-6"><img src="${p.image}" class="w-full h-full object-cover"></div>
                    <p class="text-[9px] text-blue-400 font-bold uppercase mb-1">${p.category} | ${p.subCategory}</p>
                    <h3 class="font-black text-base md:text-lg mb-2 text-white italic underline decoration-blue-500/20 underline-offset-4">${p.name}</h3>
                    <div class="flex justify-between items-center mb-6">
                        <div><span class="text-blue-400 font-black text-xl">$${p.price}</span>${p.oldPrice ? `<span class="text-gray-500 text-xs line-through ml-2">$${p.oldPrice}</span>` : ''}</div>
                        ${canM ? `<div class="flex gap-2"><button onclick="editProduct('${key}', '${p.name}', '${p.price}', '${p.image}')" class="text-yellow-500 text-[9px]">✎</button><button onclick="deleteProduct('${key}')" class="text-red-500 text-[9px]">✕</button></div>` : ''}
                    </div>
                    <button onclick="viewDetails('${key}', '${p.name}', '${p.price}', '${p.image}')" class="w-full bg-white/5 hover:bg-blue-600 py-4 rounded-[20px] text-[10px] font-black uppercase transition-all shadow-xl">التفاصيل والتقييمات</button>
                </div>`;
            });
        }

        function filterByCategory(cat) { const f = {}; Object.keys(allProducts).forEach(k => { if(cat==='الكل' || allProducts[k].category === cat) f[k] = allProducts[k]; }); renderGrid(f); }
        window.filterBySub = (sub) => { const f = {}; Object.keys(allProducts).forEach(k => { if(allProducts[k].subCategory === sub) f[k] = allProducts[k]; }); renderGrid(f); };
        window.filterProducts = () => { const t = document.getElementById('searchInput').value.toLowerCase(); const f = {}; Object.keys(allProducts).forEach(k => { if(allProducts[k].name.toLowerCase().includes(t)) f[k] = allProducts[k]; }); renderGrid(f); };
        window.loadWishlistOnly = () => { const f = {}; Object.keys(allProducts).forEach(k => { if(userWishlist.includes(k)) f[k] = allProducts[k]; }); renderGrid(f); };
        function loadUsers() { onValue(ref(db, 'users'), (s) => { const l = document.getElementById('usersList'); l.innerHTML = ''; Object.keys(s.val() || {}).forEach(uid => { const u = s.val()[uid]; l.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl border border-white/5 flex flex-col gap-2 animate-fade-in"><div class="flex justify-between items-start"><p class="font-bold text-sm text-white">${u.name}</p><span class="text-[8px] px-2 py-0.5 rounded-full bg-blue-500/10 text-blue-400 font-black uppercase">${u.role}</span></div><div class="flex gap-1"><button onclick="changeRole('${uid}', 'marketer')" class="flex-1 text-[8px] border border-blue-500/20 rounded p-1 btn-glow-marketer text-blue-400">مسوق</button><button onclick="changeRole('${uid}', 'admin')" class="flex-1 text-[8px] border border-yellow-500/20 rounded p-1 btn-glow-admin text-yellow-500">أدمن</button><button onclick="changeRole('${uid}', 'customer')" class="flex-1 text-[8px] bg-white/5 rounded p-1">عميل</button></div></div>`; }); }); }
        window.changeRole = (uid, r) => update(ref(db, 'users/' + uid), { role: r });
        window.toggleWishlist = async (id) => { const idx = userWishlist.indexOf(id); const refP = ref(db, `products/${id}/likes`); if (idx > -1) { userWishlist.splice(idx, 1); runTransaction(refP, (c) => (c || 1) - 1); } else { userWishlist.push(id); runTransaction(refP, (c) => (c || 0) + 1); } await update(ref(db, 'users/' + currentUser.uid), { wishlist: userWishlist }); };
        window.viewDetails = (id, n, p, i) => window.location.href = `details.html?id=${id}&name=${encodeURIComponent(n)}&price=${p}&image=${encodeURIComponent(i)}`;
        window.logout = () => signOut(auth).then(() => window.location.href = "login.html");
        window.closeModal = () => document.getElementById('usersModal').style.display = 'none';
    </script>
</body>
</html>
