<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script src="translations.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المتجر الذكي | Start Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); color: #f1f5f9; font-family: 'Cairo', sans-serif; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .product-card { transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); position: relative; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.05); }
        .product-card:hover { transform: translateY(-15px) scale(1.03); background: rgba(255, 255, 255, 0.08); border-color: rgba(59, 130, 246, 0.6); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 30px rgba(59, 130, 246, 0.2); }
        
        /* تنسيق الأيقونات والتصنيفات */
        .category-item { flex: 0 0 auto; width: 90px; text-align: center; cursor: pointer; transition: 0.4s; position: relative; }
        .category-item img { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.1); transition: 0.4s; margin: 0 auto 8px; }
        .category-item:hover img { border-color: #3b82f6; transform: rotate(5deg) scale(1.1); }
        .category-item.active img { border-color: #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        .category-item span { font-size: 11px; font-weight: 900; color: #94a3b8; }
        .category-item.active span { color: #fff; text-shadow: 0 0 10px #3b82f6; }

        /* الأنيميشن السلس لظهور الفروع */
        .sub-cats { max-height: 0; opacity: 0; overflow: hidden; transition: 0.5s ease-in-out; }
        .sub-cats.show { max-height: 150px; opacity: 1; margin-top: 15px; }

        .stat-card { background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(255, 255, 255, 0.02)); border: 1px solid rgba(255,255,255,0.05); transition: 0.4s; cursor: pointer; }
        .stat-card:hover { transform: scale(1.05); border-color: #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }

        .btn-glow-admin { box-shadow: 0 0 10px rgba(234, 179, 8, 0.2); transition: 0.3s; }
        .btn-glow-admin:hover { box-shadow: 0 0 20px rgba(234, 179, 8, 0.5); background: #eab308; color: black; }
        .btn-glow-marketer { box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); transition: 0.3s; }
        .btn-glow-marketer:hover { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); background: #3b82f6; color: white; }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="pb-24">

    <!-- Navbar العلوي -->
    <nav class="fixed top-0 left-0 right-0 z-50 p-2 md:p-6">
        <div class="max-w-7xl mx-auto glass rounded-xl md:rounded-2xl px-4 md:px-8 py-3 md:py-4 flex justify-between items-center shadow-2xl">
            <div class="text-lg md:text-2xl font-black text-white hover:scale-105 transition-transform">
                <a href="index.html">START<span class="text-blue-400">ONLINE</span></a>
            </div>
            <ul class="hidden md:flex gap-8 font-bold text-sm text-gray-400">
                <li><a href="index.html" class="hover:text-white transition">الرئيسية</a></li>
                <li><a href="products.html" class="text-blue-400 font-black underline underline-offset-8">المتجر</a></li>
                <li><a href="profile.html" class="hover:text-white transition">حسابي</a></li>
            </ul>
            <div class="flex items-center gap-2">
                <div id="userInfo" class="hidden lg:block text-[10px] font-bold text-gray-400 bg-white/5 px-3 py-1 rounded-full">تحقق...</div>
                <button onclick="logout()" class="bg-red-500/10 text-red-500 px-3 md:px-4 py-2 rounded-lg md:rounded-xl text-[10px] font-bold border border-red-500/20 hover:bg-red-500 hover:text-white transition shadow-lg">خروج</button>
            </div>
        </div>
    </nav>

    <!-- Navbar السفلي (ستايل الصفحة الرئيسية) -->
    <nav class="fixed bottom-4 left-4 right-4 z-50 md:hidden">
        <div class="glass rounded-[25px] p-2 flex justify-around items-center border border-white/10 shadow-[0_0_30px_rgba(0,0,0,0.5)]">
            <a href="index.html" class="flex flex-col items-center gap-1 text-[10px] text-gray-400 p-2"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>الرئيسية</span></a>
            <a href="products.html" class="flex flex-col items-center gap-1 text-[10px] text-blue-400 p-2"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/></svg><span>المتجر</span></a>
            <a href="profile.html" class="flex flex-col items-center gap-1 text-[10px] text-gray-400 p-2"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>حسابي</span></a>
        </div>
    </nav>

    <div class="pt-24 md:pt-32"></div>

    <!-- شريط التصنيفات المطور -->
    <section class="max-w-7xl mx-auto px-4 mb-6 overflow-x-auto no-scrollbar">
        <div class="flex gap-8 pb-2 justify-start md:justify-center" id="categoriesBar">
            <div class="category-item active" onclick="selectParentCat('الكل', this)"><img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=200"><span>الكل</span></div>
            <div class="category-item" onclick="selectParentCat('ملابس', this)"><img src="https://images.unsplash.com/photo-1620799140408-edc6dcb6d633?w=200"><span>ملابس</span></div>
            <div class="category-item" onclick="selectParentCat('إكسسوارات', this)"><img src="https://images.unsplash.com/photo-1523206489230-c012c64b2b48?w=200"><span>إكسسوارات</span></div>
            <div class="category-item" onclick="selectParentCat('عطور', this)"><img src="https://images.unsplash.com/photo-1541643600914-78b084683601?w=200"><span>عطور</span></div>
            <div class="category-item" onclick="selectParentCat('صحة وجمال', this)"><img src="https://images.unsplash.com/photo-1512496011212-62b2488cd702?w=200"><span>صحة وجمال</span></div>
            <div class="category-item" onclick="selectParentCat('أكثر مبيعاً', this)"><img src="https://images.unsplash.com/photo-1555529669-e69e7aa0ba9a?w=200"><span>أكثر مبيعاً</span></div>
        </div>
        
        <!-- الفروع (تظهر ديناميكياً) -->
        <div id="subCatsContainer" class="sub-cats flex gap-4 justify-center">
            <button onclick="filterBySub('رجالي')" class="glass px-6 py-2 rounded-full text-[10px] font-bold hover:bg-blue-600 transition">قسم الرجالي</button>
            <button onclick="filterBySub('حريمي')" class="glass px-6 py-2 rounded-full text-[10px] font-bold hover:bg-pink-600 transition">قسم الحريمي</button>
        </div>
    </section>

    <!-- داشبورد الإحصائيات (تفتح مودال) -->
    <section id="adminStats" class="max-w-7xl mx-auto px-4 mb-10 hidden grid grid-cols-2 md:grid-cols-5 gap-4 animate-fade-in">
        <div class="stat-card p-4 rounded-3xl text-center" onclick="showUsersByRole('all')"><p class="text-[9px] text-gray-500 uppercase font-black">المستخدمين</p><h3 id="totalUsers" class="text-xl font-black text-blue-400">0</h3></div>
        <div class="stat-card p-4 rounded-3xl text-center" onclick="showProductsList()"><p class="text-[9px] text-gray-500 uppercase font-black">المنتجات</p><h3 id="totalProducts" class="text-xl font-black text-green-400">0</h3></div>
        <div class="stat-card p-4 rounded-3xl text-center" onclick="showUsersByRole('marketer')"><p class="text-[9px] text-gray-500 uppercase font-black">المسوقين</p><h3 id="totalMarketers" class="text-xl font-black text-purple-400">0</h3></div>
        <div class="stat-card p-4 rounded-3xl text-center" onclick="showUsersByRole('customer')"><p class="text-[9px] text-gray-500 uppercase font-black">العملاء</p><h3 id="totalCustomers" class="text-xl font-black text-pink-400">0</h3></div>
        <div class="stat-card p-4 rounded-3xl text-center"><p class="text-[9px] text-gray-500 uppercase font-black">التقييمات</p><h3 id="totalReviews" class="text-xl font-black text-yellow-400">0</h3></div>
    </section>

    <!-- البحث والمفضلات -->
    <section class="max-w-7xl mx-auto px-4 mb-10 flex flex-col md:flex-row gap-4 animate-fade-in">
        <input type="text" id="searchInput" oninput="filterProducts()" placeholder="ابحث عن اسم المنتج..." class="flex-1 bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500 text-sm text-white">
        <div class="flex gap-2">
            <button onclick="loadWishlistOnly()" class="bg-pink-500/10 text-pink-500 px-6 py-4 rounded-2xl text-xs font-bold border border-pink-500/20 hover:bg-pink-500 transition-all">مفضلاتي ❤</button>
            <button onclick="renderGrid(allProducts)" class="bg-white/5 text-gray-400 px-6 py-4 rounded-2xl text-xs font-bold border border-white/10 hover:bg-white hover:text-black transition-all">الكل</button>
        </div>
    </section>

    <!-- لوحة إدارة الأعضاء (Glow المطور) -->
    <section id="adminUsersPanel" class="max-w-7xl mx-auto mb-10 px-4 hidden glass rounded-[35px] p-6 border border-white/10">
        <h2 class="text-xl font-black mb-6 text-gray-400 italic">إدارة الأعضاء</h2>
        <div id="usersList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </section>

    <!-- لوحة إضافة المنتجات الشاملة -->
    <section id="controlPanel" class="max-w-5xl mx-auto px-4 mb-12 hidden animate-fade-in">
        <div class="glass p-8 rounded-[40px] border border-blue-500/10 shadow-2xl">
            <h2 class="text-2xl font-black mb-8 text-blue-400 italic underline underline-offset-8">نشر إبداع جديد بالتفاصيل</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <input type="text" id="pName" placeholder="اسم المنتج" class="bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-xs text-white">
                <select id="pCategory" class="bg-slate-800 border border-white/10 p-4 rounded-2xl outline-none text-xs text-white">
                    <option value="">اختر النوع الأساسي</option>
                    <option value="ملابس">ملابس</option><option value="إكسسوارات">إكسسوارات</option><option value="عطور">عطور</option><option value="صحة وجمال">صحة وجمال</option>
                </select>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <select id="pSubCategory" class="bg-slate-800 border border-white/10 p-4 rounded-2xl outline-none text-[10px] text-white"><option value="عام">عام</option><option value="رجالي">رجالي</option><option value="حريمي">حريمي</option></select>
                <input type="number" id="pPrice" placeholder="السعر النهائي ($)" class="bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-xs text-white">
                <input type="number" id="pOldPrice" placeholder="السعر القديم ($)" class="bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-xs text-white">
                <input type="text" id="pModel" placeholder="الموديل" class="bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-xs text-white">
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <input type="text" id="pColors" placeholder="الألوان (أحمر، أزرق...)" class="bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-xs text-white">
                <input type="text" id="pSizes" placeholder="المقاسات (XL, L, M...)" class="bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-xs text-white">
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <input type="text" id="pImage" placeholder="رابط الصورة الأساسية" class="bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-xs text-white">
                <input type="text" id="pMaterial" placeholder="الماتريال (خامة المنتج)" class="bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-xs text-white">
            </div>
            <input type="text" id="pExtraImages" placeholder="روابط صور الألوان الأخرى (افصل بفاصلة ,)" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-xs text-white mb-6">
            <textarea id="pDesc" placeholder="الوصف الكامل للمنتج..." class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-xs text-white h-32 mb-6"></textarea>
            <button onclick="saveProduct()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-3xl shadow-xl transition-all uppercase tracking-widest">تأكيد النشر العالمي</button>
        </div>
    </section>

    <!-- Modal عرض قائمة المستخدمين -->
    <div id="usersModal" class="fixed inset-0 bg-black/90 z-[100] hidden items-center justify-center p-4">
        <div class="glass w-full max-w-2xl p-8 rounded-[40px] border border-white/10 shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-6 left-6 text-gray-500 hover:text-white font-bold">✕</button>
            <h2 id="modalTitle" class="text-xl font-black mb-6 italic text-blue-400 underline decoration-blue-500/30">قائمة الأعضاء</h2>
            <div id="modalList" class="space-y-3 max-h-[400px] overflow-y-auto no-scrollbar"></div>
        </div>
    </div>

    <!-- المعرض -->
    <main class="max-w-7xl mx-auto px-4">
        <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, remove, update, get, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCyypXt8LnHiVBR2Ka0Mb8ntXu6dJH9N-w", authDomain: "start-online-6f460.firebaseapp.com", projectId: "start-online-6f460", databaseURL: "https://start-online-6f460-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getDatabase(app);

        let currentUser = null, userRole = 'customer', allProducts = {}, allUsers = {}, userWishlist = [];
        let selectedCategory = 'الكل', selectedSub = 'الكل';

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userSnap = await get(ref(db, 'users/' + user.uid));
                if (userSnap.exists()) {
                    const u = userSnap.val(); userRole = u.role; userWishlist = u.wishlist || [];
                    document.getElementById('userInfo').innerText = `${u.name} | ${userRole.toUpperCase()}`;
                    if (userRole === 'admin' || userRole === 'marketer') {
                        document.getElementById('controlPanel').classList.remove('hidden');
                        if (userRole === 'admin') {
                            document.getElementById('adminStats').classList.remove('hidden');
                            document.getElementById('adminUsersPanel').classList.remove('hidden');
                            loadAdminDashboard(); loadUsers();
                        }
                    }
                }
                loadProducts();
            } else { window.location.href = "login.html"; }
        });

        // دوال الإحصائيات والداشبورد
        function loadAdminDashboard() {
            onValue(ref(db, 'users'), (snap) => {
                allUsers = snap.val() || {};
                const usersArr = Object.values(allUsers);
                document.getElementById('totalUsers').innerText = usersArr.length;
                document.getElementById('totalMarketers').innerText = usersArr.filter(u => u.role === 'marketer').length;
                document.getElementById('totalCustomers').innerText = usersArr.filter(u => u.role === 'customer').length;
            });
            onValue(ref(db, 'products'), (snap) => document.getElementById('totalProducts').innerText = Object.keys(snap.val() || {}).length);
            onValue(ref(db, 'reviews'), (snap) => {
                let count = 0; Object.values(snap.val() || {}).forEach(r => count += Object.keys(r).length);
                document.getElementById('totalReviews').innerText = count;
            });
        }

        window.showUsersByRole = (role) => {
            const modal = document.getElementById('usersModal');
            const list = document.getElementById('modalList');
            const title = document.getElementById('modalTitle');
            modal.style.display = 'flex';
            title.innerText = `أعضاء رتبة: ${role.toUpperCase()}`;
            list.innerHTML = '';
            
            Object.values(allUsers).forEach(u => {
                if(role === 'all' || u.role === role) {
                    list.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl border border-white/5 flex flex-col gap-1">
                        <p class="font-bold text-white">${u.name} <span class="text-[9px] text-blue-400">(${u.role})</span></p>
                        <p class="text-[10px] text-gray-500">${u.email} | ${u.phone || 'بدون هاتف'}</p>
                    </div>`;
                }
            });
        }
        window.closeModal = () => document.getElementById('usersModal').style.display = 'none';

        // تصنيفات وفلترة
        window.selectParentCat = (cat, el) => {
            selectedCategory = cat;
            document.querySelectorAll('.category-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            const subPanel = document.getElementById('subCatsContainer');
            if(cat === 'الكل' || cat === 'أكثر مبيعاً') {
                subPanel.classList.remove('show');
                filterFinal();
            } else {
                subPanel.classList.add('show');
                filterFinal();
            }
        };

        window.filterBySub = (sub) => {
            selectedSub = sub;
            filterFinal();
        };

        function filterFinal() {
            let filtered = {};
            Object.keys(allProducts).forEach(key => {
                const p = allProducts[key];
                const matchParent = (selectedCategory === 'الكل' || p.category === selectedCategory);
                const matchSub = (selectedSub === 'الكل' || p.subCategory === selectedSub);
                if(matchParent && matchSub) filtered[key] = p;
            });
            renderGrid(filtered);
        }

        function loadUsers() {
            onValue(ref(db, 'users'), (snapshot) => {
                const users = snapshot.val(); const list = document.getElementById('usersList'); list.innerHTML = '';
                if(users) {
                    Object.keys(users).forEach(uid => {
                        const u = users[uid];
                        list.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl border border-white/5 flex flex-col gap-2">
                            <div class="flex justify-between items-start"><p class="font-bold text-sm text-white">${u.name}</p><span class="text-[8px] px-2 py-0.5 rounded-full bg-blue-500/10 text-blue-400 font-black uppercase">${u.role}</span></div>
                            <div class="flex gap-1">
                                <button onclick="changeRole('${uid}', 'marketer')" class="flex-1 text-[8px] border border-blue-500/20 rounded-lg p-2 btn-glow-marketer">مسوق</button>
                                <button onclick="changeRole('${uid}', 'admin')" class="flex-1 text-[8px] border border-yellow-500/20 rounded-lg p-2 btn-glow-admin">أدمن</button>
                                <button onclick="changeRole('${uid}', 'customer')" class="flex-1 text-[8px] bg-white/5 rounded-lg p-2">عميل</button>
                            </div>
                        </div>`;
                    });
                }
            });
        }
        window.changeRole = (uid, r) => update(ref(db, 'users/' + uid), { role: r });

        // حفظ المنتج الشامل
        window.saveProduct = () => {
            const name = document.getElementById('pName').value, price = document.getElementById('pPrice').value;
            if(name && price) {
                push(ref(db, 'products'), {
                    name, price, 
                    oldPrice: document.getElementById('pOldPrice').value, 
                    category: document.getElementById('pCategory').value,
                    subCategory: document.getElementById('pSubCategory').value,
                    model: document.getElementById('pModel').value,
                    material: document.getElementById('pMaterial').value,
                    colors: document.getElementById('pColors').value, 
                    sizes: document.getElementById('pSizes').value,
                    desc: document.getElementById('pDesc').value, 
                    image: document.getElementById('pImage').value || 'https://via.placeholder.com/400',
                    extraImages: document.getElementById('pExtraImages').value,
                    owner: currentUser.uid, likes: 0
                });
                alert("تم النشر بنجاح!");
            }
        };

        window.editProduct = async (id, oldN, oldP, oldI) => {
            const nn = prompt("الاسم:", oldN), np = prompt("السعر:", oldP), ni = prompt("الصورة:", oldI);
            if(nn && np) await update(ref(db, 'products/' + id), { name: nn, price: np, image: ni });
        };

        function loadProducts() { onValue(ref(db, 'products'), (snapshot) => { allProducts = snapshot.val() || {}; renderGrid(allProducts); }); }

        function renderGrid(products) {
            const grid = document.getElementById('productsGrid'); grid.innerHTML = '';
            Object.keys(products).forEach(key => {
                const p = products[key], isSaved = userWishlist.includes(key), canManage = (userRole === 'admin') || (userRole === 'marketer' && p.owner === currentUser.uid);
                grid.innerHTML += `
                    <div class="product-card glass p-5 rounded-[35px] animate-fade-in shadow-xl">
                        <div class="absolute top-5 left-5 flex flex-col items-center gap-1 z-10">
                            <button onclick="toggleWishlist('${key}')" class="p-2.5 rounded-full backdrop-blur-md ${isSaved ? 'text-pink-500 bg-pink-500/10' : 'text-gray-400 bg-black/30'}">❤</button>
                            <span class="text-[10px] font-black text-gray-400">${p.likes || 0}</span>
                        </div>
                        <div class="w-full h-48 rounded-[25px] overflow-hidden mb-6"><img src="${p.image}" class="w-full h-full object-cover"></div>
                        <p class="text-[9px] text-blue-400 font-bold uppercase mb-1">${p.category} | ${p.subCategory}</p>
                        <h3 class="font-black text-lg mb-2 text-white italic tracking-tighter">${p.name}</h3>
                        <div class="flex justify-between items-center mb-6">
                            <div><span class="text-blue-400 font-black text-2xl">$${p.price}</span>${p.oldPrice ? `<span class="text-gray-500 text-xs line-through ml-2">$${p.oldPrice}</span>` : ''}</div>
                            ${canManage ? `<div class="flex gap-2"><button onclick="editProduct('${key}', '${p.name}', '${p.price}', '${p.image}')" class="text-yellow-500 text-[9px]">✎</button><button onclick="deleteProduct('${key}')" class="text-red-500 text-[9px]">✕</button></div>` : ''}
                        </div>
                        <button onclick="viewDetails('${key}', '${p.name}', '${p.price}', '${p.image}')" class="w-full bg-white/5 hover:bg-blue-600 py-4 rounded-[20px] text-[10px] font-black uppercase transition-all shadow-xl border border-white/5">التفاصيل والتقييمات</button>
                    </div>`;
            });
        }

        window.toggleWishlist = async (id) => {
            const index = userWishlist.indexOf(id); const productRef = ref(db, `products/${id}/likes`);
            if (index > -1) { userWishlist.splice(index, 1); runTransaction(productRef, (c) => (c || 1) - 1); }
            else { userWishlist.push(id); runTransaction(productRef, (c) => (c || 0) + 1); }
            await update(ref(db, 'users/' + currentUser.uid), { wishlist: userWishlist });
        };
        window.deleteProduct = (id) => confirm("حذف؟") && remove(ref(db, 'products/' + id));
        window.viewDetails = (id, n, p, i) => window.location.href = `details.html?id=${id}&name=${encodeURIComponent(n)}&price=${p}&image=${encodeURIComponent(i)}`;
        window.filterProducts = () => { const t = document.getElementById('searchInput').value.toLowerCase(); const f = {}; Object.keys(allProducts).forEach(k => { if(allProducts[k].name.toLowerCase().includes(t)) f[k] = allProducts[k]; }); renderGrid(f); };
        window.loadWishlistOnly = () => { const f = {}; Object.keys(allProducts).forEach(k => { if(userWishlist.includes(k)) f[k] = allProducts[k]; }); renderGrid(f); };
        window.logout = () => signOut(auth).then(() => window.location.href = "login.html");
    </script>
</body>
</html>
