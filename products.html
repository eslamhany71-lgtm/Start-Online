<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المتجر | Start Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: #f1f5f9;
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .product-card:hover {
            transform: translateY(-10px);
            border-color: rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body class="pb-20">

    <!-- Navbar -->
    <nav class="p-6">
        <div class="max-w-7xl mx-auto glass rounded-2xl px-8 py-4 flex justify-between items-center">
            <div class="text-xl font-black tracking-tighter text-white">
                <a href="index.html">START<span class="text-blue-400">ONLINE</span></a>
            </div>
            <ul class="flex gap-8 font-bold text-sm">
                <li><a href="index.html" class="hover:text-blue-400 transition">الرئيسية</a></li>
                <li><a href="products.html" class="text-blue-400">المتجر</a></li>
            </ul>
            <button onclick="toggleAdmin()" class="bg-blue-600/20 text-blue-400 border border-blue-600/50 px-4 py-2 rounded-lg text-xs font-bold hover:bg-blue-600 hover:text-white transition">
                وضع المسوق
            </button>
        </div>
    </nav>

    <!-- Admin Panel -->
    <section id="adminPanel" class="max-w-4xl mx-auto mt-10 p-8 glass rounded-3xl hidden">
        <h2 class="text-2xl font-black mb-6 flex items-center gap-2">إضافة منتج للسحابة</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <input type="text" id="pName" placeholder="اسم المنتج" class="bg-white/5 border border-white/10 p-3 rounded-xl focus:outline-none">
            <input type="number" id="pPrice" placeholder="السعر ($)" class="bg-white/5 border border-white/10 p-3 rounded-xl focus:outline-none">
            <input type="text" id="pImage" placeholder="رابط الصورة" class="bg-white/5 border border-white/10 p-3 rounded-xl focus:outline-none">
        </div>
        <button id="btnSave" class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition">إرسال لجميع المستخدمين</button>
    </section>

    <!-- Products Grid -->
    <main class="max-w-7xl mx-auto px-6 mt-16">
        <h1 class="text-4xl font-black mb-10">المعرض السحابي المباشر</h1>
        <div id="productsGrid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8">
            <!-- المنتجات ستظهر هنا من Firebase -->
        </div>
    </main>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // إعداداتك الخاصة
        const firebaseConfig = {
            apiKey: "AIzaSyCyypXt8LnHiVBR2Ka0Mb8ntXu6dJH9N-w",
            authDomain: "start-online-6f460.firebaseapp.com",
            projectId: "start-online-6f460",
            storageBucket: "start-online-6f460.firebasestorage.app",
            messagingSenderId: "343437561451",
            appId: "1:343437561451:web:2318fb3b90eb48fd0a6b2e",
            databaseURL: "https://start-online-6f460-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // وظيفة الإضافة للسحابة
        window.addProduct = function() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const image = document.getElementById('pImage').value || 'https://via.placeholder.com/300';

            if(name && price) {
                const productsRef = ref(db, 'products');
                const newProductRef = push(productsRef);
                set(newProductRef, { name, price, image });
                
                document.getElementById('pName').value = '';
                document.getElementById('pPrice').value = '';
            }
        };

        // وظيفة تحديث السعر في السحابة
        window.updatePrice = function(id) {
            const newPrice = prompt("أدخل السعر الجديد:");
            if (newPrice) {
                const updates = {};
                updates['/products/' + id + '/price'] = newPrice;
                update(ref(db), updates);
            }
        };

        // الاستماع للتغييرات (Real-time)
        const productsGrid = document.getElementById('productsGrid');
        onValue(ref(db, 'products'), (snapshot) => {
            const data = snapshot.val();
            productsGrid.innerHTML = '';
            if (data) {
                Object.keys(data).forEach(key => {
                    const p = data[key];
                    productsGrid.innerHTML += `
                        <div class="product-card glass p-4 rounded-3xl border border-white/5 transition-all">
                            <img src="${p.image}" class="w-full h-48 object-cover rounded-2xl mb-4">
                            <h3 class="text-xl font-bold mb-2">${p.name}</h3>
                            <div class="flex justify-between items-center mb-4">
                                <span class="text-blue-400 font-black text-2xl">$${p.price}</span>
                                <button onclick="updatePrice('${key}')" class="text-[10px] text-gray-500 underline">تعديل السعر</button>
                            </div>
                            <button class="w-full bg-white/10 hover:bg-white hover:text-black py-2 rounded-xl font-bold transition">شراء الآن</button>
                        </div>
                    `;
                });
            }
        });

        document.getElementById('btnSave').onclick = addProduct;
        window.toggleAdmin = () => document.getElementById('adminPanel').classList.toggle('hidden');
    </script>
</body>
</html>
