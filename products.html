<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المتجر | Start Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: #f1f5f9;
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .product-card:hover {
            transform: translateY(-10px);
            border-color: rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body class="pb-20">

    <!-- Navbar -->
    <nav class="p-6">
        <div class="max-w-7xl mx-auto glass rounded-2xl px-8 py-4 flex justify-between items-center">
            <div class="text-xl font-black tracking-tighter text-white">
                START<span class="text-blue-400">ONLINE</span>
            </div>
            <ul class="flex gap-8 font-bold text-sm">
                <li><a href="index.html" class="hover:text-blue-400 transition">الرئيسية</a></li>
                <li><a href="products.html" class="text-blue-400">المتجر</a></li>
            </ul>
            <button onclick="toggleAdmin()" class="bg-blue-600/20 text-blue-400 border border-blue-600/50 px-4 py-2 rounded-lg text-xs font-bold hover:bg-blue-600 hover:text-white transition">
                وضع المسوق
            </button>
        </div>
    </nav>

    <!-- Admin Panel (مخفي افتراضياً) -->
    <section id="adminPanel" class="max-w-4xl mx-auto mt-10 p-8 glass rounded-3xl hidden animate-fade-in">
        <h2 class="text-2xl font-black mb-6 flex items-center gap-2">
            <span class="w-3 h-3 bg-blue-500 rounded-full"></span>
            إضافة منتج جديد
        </h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <input type="text" id="pName" placeholder="اسم المنتج" class="bg-white/5 border border-white/10 p-3 rounded-xl focus:outline-none focus:border-blue-500">
            <input type="number" id="pPrice" placeholder="السعر ($)" class="bg-white/5 border border-white/10 p-3 rounded-xl focus:outline-none focus:border-blue-500">
            <input type="text" id="pImage" placeholder="رابط الصورة" class="bg-white/5 border border-white/10 p-3 rounded-xl focus:outline-none focus:border-blue-500">
        </div>
        <button onclick="addProduct()" class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition">حفظ وعرض المنتج</button>
    </section>

    <!-- Products Grid -->
    <main class="max-w-7xl mx-auto px-6 mt-16">
        <div class="flex justify-between items-end mb-10">
            <div>
                <h1 class="text-4xl font-black mb-2">المعرض الرقمي</h1>
                <p class="text-gray-400">استكشف أفضل المنتجات المتاحة الآن</p>
            </div>
        </div>

        <div id="productsGrid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8">
            <!-- المنتجات ستظهر هنا برمجياً -->
        </div>
    </main>

    <script>
        // مصفوفة المنتجات (تبدأ ببيانات تجريبية لو المتصفح فاضي)
        let products = JSON.parse(localStorage.getItem('myProducts')) || [
            { id: 1, name: "حزمة التصميم الاحترافي", price: 45, image: "https://images.unsplash.com/photo-1626785774573-4b799315345d?w=500" },
            { id: 2, name: "كورس التسويق الحديث", price: 89, image: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=500" }
        ];

        // وظيفة لإظهار/إخفاء لوحة التحكم
        function toggleAdmin() {
            const panel = document.getElementById('adminPanel');
            panel.classList.toggle('hidden');
        }

        // وظيفة لإضافة منتج
        function addProduct() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const image = document.getElementById('pImage').value || 'https://via.placeholder.com/300';

            if(name && price) {
                products.push({ id: Date.now(), name, price, image });
                saveAndRender();
                // مسح الخانات بعد الإضافة
                document.getElementById('pName').value = '';
                document.getElementById('pPrice').value = '';
                document.getElementById('pImage').value = '';
            } else {
                alert("برجاء ملء البيانات الأساسية");
            }
        }

        // وظيفة لتغيير السعر
        function updatePrice(id) {
            const newPrice = prompt("أدخل السعر الجديد:");
            if (newPrice) {
                products = products.map(p => p.id === id ? {...p, price: newPrice} : p);
                saveAndRender();
            }
        }

        // وظيفة لحفظ البيانات ورسم المنتجات
        function saveAndRender() {
            localStorage.setItem('myProducts', JSON.stringify(products));
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = products.map(p => `
                <div class="product-card glass p-4 rounded-3xl border border-white/5 transition-all duration-300">
                    <img src="${p.image}" class="w-full h-48 object-cover rounded-2xl mb-4 shadow-lg">
                    <h3 class="text-xl font-bold mb-2">${p.name}</h3>
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-blue-400 font-black text-2xl">$${p.price}</span>
                        <button onclick="updatePrice(${p.id})" class="text-[10px] text-gray-500 hover:text-white underline">تعديل السعر</button>
                    </div>
                    <button class="w-full bg-white/10 hover:bg-white text-white hover:text-black py-2 rounded-xl font-bold transition">شراء الآن</button>
                </div>
            `).join('');
        }

        // تشغيل العرض عند فتح الصفحة
        saveAndRender();
    </script>
</body>
</html>
