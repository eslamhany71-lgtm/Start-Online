<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><title>لوحة التحكم | Start Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); color: #f1f5f9; font-family: 'Cairo', sans-serif; min-height: 100vh; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
    </style>
</head>
<body class="pb-20">

    <nav class="fixed top-0 left-0 right-0 z-50 p-6">
        <div class="max-w-7xl mx-auto glass rounded-2xl px-8 py-4 flex justify-between items-center shadow-2xl">
            <div class="text-xl font-black text-white"><a href="index.html">START<span class="text-blue-400">ONLINE</span></a></div>
            <ul class="flex gap-8 font-bold text-sm text-gray-400">
                <li><a href="index.html" class="hover:text-white transition">الرئيسية</a></li>
                <li><a href="products.html" class="hover:text-white transition">المتجر</a></li>
                <li><a href="profile.html" class="text-blue-400 underline underline-offset-8 font-black">حسابي</a></li>
            </ul>
        </div>
    </nav>

    <div class="pt-32 px-6 max-w-7xl mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            
            <!-- Sidebar: User Info -->
            <div class="lg:col-span-1 space-y-6">
                <div class="glass p-8 rounded-[40px] text-center border border-white/5 relative">
                    <div id="userRoleBadge" class="absolute top-4 left-4 text-[8px] font-black bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full uppercase tracking-tighter">...</div>
                    <img id="userImg" src="https://via.placeholder.com/150" class="w-24 h-24 rounded-full mx-auto mb-4 object-cover border-4 border-blue-500/20 shadow-xl">
                    <h1 id="userName" class="text-2xl font-black mb-1">جاري التحميل...</h1>
                    <p id="userEmail" class="text-gray-500 text-xs mb-6">email@example.com</p>
                    
                    <!-- إعدادات المسوق (رقم الدفع) -->
                    <div id="marketerSettings" class="hidden border-t border-white/5 pt-6 mt-6 space-y-4">
                        <p class="text-[10px] text-blue-400 font-bold mb-2 uppercase">إعدادات الدفع (جدية الحجز)</p>
                        <input type="text" id="payNumber" placeholder="رقم تحويل (كاش / إنستا باي)" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl text-xs outline-none focus:border-blue-500">
                        <button onclick="updatePaymentInfo()" class="w-full bg-blue-600 py-2 rounded-xl text-[10px] font-bold">تحديث رقم الدفع</button>
                    </div>

                    <button onclick="logout()" class="w-full mt-6 py-3 bg-red-500/10 text-red-500 rounded-2xl text-[10px] font-bold hover:bg-red-500 hover:text-white transition-all">خروج</button>
                </div>
            </div>

            <!-- Main Content: Orders & Inventory -->
            <div class="lg:col-span-2 space-y-12">
                
                <!-- قسم الطلبات المستلمة (للمسوق والأدمن) -->
                <section id="ordersSection" class="hidden">
                    <h2 class="text-2xl font-black mb-6 flex items-center gap-3 italic underline decoration-blue-500 underline-offset-8">الطلبات المستلمة (Orders)</h2>
                    <div id="ordersList" class="space-y-4">
                        <!-- الطلبات تظهر هنا -->
                    </div>
                </section>

                <!-- قسم المفضلات -->
                <section>
                    <h2 class="text-2xl font-black mb-6 flex items-center gap-3">قائمة المفضلات ❤</h2>
                    <div id="wishlistGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </section>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyypXt8LnHiVBR2Ka0Mb8ntXu6dJH9N-w",
            authDomain: "start-online-6f460.firebaseapp.com",
            projectId: "start-online-6f460",
            databaseURL: "https://start-online-6f460-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let uid = null;
        let role = 'customer';

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                uid = user.uid;
                const snap = await get(ref(db, 'users/' + uid));
                if (snap.exists()) {
                    const u = snap.val();
                    role = u.role;
                    document.getElementById('userName').innerText = u.name;
                    document.getElementById('userEmail').innerText = u.email;
                    document.getElementById('userRoleBadge').innerText = role;
                    document.getElementById('userImg').src = u.photo || `https://ui-avatars.com/api/?name=${u.name}&background=3b82f6&color=fff`;
                    if(u.payNumber) document.getElementById('payNumber').value = u.payNumber;

                    if(role === 'marketer' || role === 'admin') {
                        document.getElementById('marketerSettings').classList.remove('hidden');
                        document.getElementById('ordersSection').classList.remove('hidden');
                        loadOrders();
                    }
                    loadWishlist(u.wishlist || []);
                }
            } else { window.location.href = "login.html"; }
        });

        // تحديث رقم الدفع للمسوق
        window.updatePaymentInfo = async () => {
            const num = document.getElementById('payNumber').value;
            await update(ref(db, 'users/' + uid), { payNumber: num });
            alert("تم تحديث بيانات الدفع الخاصة بك بنجاح!");
        };

        // تحميل الطلبات (كل مسوق يشوف أوردرات منتجاته فقط)
        function loadOrders() {
            onValue(ref(db, 'orders'), (snap) => {
                const ordersList = document.getElementById('ordersList');
                ordersList.innerHTML = '';
                const data = snap.val();
                if(data) {
                    Object.keys(data).forEach(key => {
                        const o = data[key];
                        // الأدمن يشوف الكل، والمسوق يشوف حاجته بس
                        if(role === 'admin' || o.marketerId === uid) {
                            ordersList.innerHTML += `
                                <div class="glass p-6 rounded-3xl border border-white/10 flex flex-col md:flex-row justify-between gap-4">
                                    <div class="space-y-1">
                                        <p class="text-blue-400 font-bold text-sm underline">${o.productName}</p>
                                        <p class="text-xs text-white">العميل: ${o.customerName}</p>
                                        <p class="text-xs text-gray-400">العنوان: ${o.address}</p>
                                        <p class="text-xs text-gray-400">موبايل: ${o.phone1} / ${o.phone2}</p>
                                    </div>
                                    <div class="text-left space-y-2">
                                        <p class="text-[10px] bg-green-500/20 text-green-400 p-2 rounded-lg inline-block font-black tracking-widest uppercase">جدية الحجز مدفوعة: $${o.deposit}</p>
                                        <p class="text-[9px] text-gray-500 italic block">إثبات الدفع: <a href="${o.receipt}" target="_blank" class="underline">عرض الإيصال</a></p>
                                    </div>
                                </div>
                            `;
                        }
                    });
                } else { ordersList.innerHTML = '<p class="text-gray-500 text-xs">لا توجد طلبات حالياً.</p>'; }
            });
        }

        function loadWishlist(wishlist) {
            onValue(ref(db, 'products'), (snap) => {
                const prods = snap.val() || {};
                const grid = document.getElementById('wishlistGrid'); grid.innerHTML = '';
                Object.keys(prods).forEach(key => {
                    if(wishlist.includes(key)) {
                        const p = prods[key];
                        grid.innerHTML += `<div class="glass p-4 rounded-2xl flex gap-4 items-center">
                            <img src="${p.image}" class="w-12 h-12 rounded-lg object-cover">
                            <div class="flex-1"><h4 class="font-bold text-xs">${p.name}</h4><p class="text-blue-400 font-black text-sm">$${p.price}</p></div>
                        </div>`;
                    }
                });
            });
        }

        window.logout = () => signOut(auth).then(() => window.location.href = "login.html");
    </script>
</body>
</html>
