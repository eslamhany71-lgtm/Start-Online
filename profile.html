<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script src="translations.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8"><title>لوحة التحكم | Start Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); color: #f1f5f9; font-family: 'Cairo', sans-serif; min-height: 100vh; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .stat-box { background: rgba(59, 130, 246, 0.05); border: 1px solid rgba(59, 130, 246, 0.1); transition: 0.3s; }
        .stat-box:hover { transform: translateY(-5px); border-color: rgba(59, 130, 246, 0.4); }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .status-pending { background: rgba(234, 179, 8, 0.1); color: #eab308; }
        .status-shipping { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .status-completed { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
        .status-failed { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
    </style>
</head>
<body class="pb-20">

    <!-- Navbar العلوي -->
    <nav class="fixed top-0 left-0 right-0 z-50 p-2 md:p-6">
        <div class="max-w-7xl mx-auto glass rounded-xl md:rounded-2xl px-4 py-3 flex justify-between items-center shadow-2xl">
            <div class="text-lg md:text-2xl font-black text-white"><a href="index.html">START<span class="text-blue-400">ONLINE</span></a></div>
            <ul class="hidden md:flex gap-8 font-bold text-sm text-gray-300">
                <li><a href="index.html" class="hover:text-white transition">الرئيسية</a></li>
                <li><a href="products.html" class="hover:text-white transition">المتجر</a></li>
                <li><a href="profile.html" class="text-blue-400 font-bold">حسابي</a></li>
            </ul>
            <button onclick="logout()" class="bg-red-500/10 text-red-500 px-4 py-2 rounded-xl text-[10px] font-black border border-red-500/10">خروج</button>
        </div>
    </nav>

    <div class="pt-32 px-6 max-w-7xl mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            
            <!-- Sidebar (بيانات المستخدم) -->
            <div class="lg:col-span-1 space-y-6">
                <div id="mainSidebar" class="glass p-8 rounded-[40px] text-center relative overflow-hidden shadow-2xl">
                    <div id="userRoleBadge" class="absolute top-4 left-4 text-[8px] font-black bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full uppercase italic">...</div>
                    <img id="userImg" src="https://via.placeholder.com/150" class="w-24 h-24 rounded-full mx-auto mb-4 object-cover border-4 border-blue-500/20 shadow-xl">
                    <h1 id="userName" class="text-2xl font-black mb-1 italic">تحميل...</h1>
                    <p id="userEmail" class="text-gray-500 text-[10px] mb-6">email@example.com</p>
                    
                    <!-- محفظة المسوق -->
                    <div id="marketerSettings" class="hidden border-t border-white/5 pt-6 mt-4 mb-6">
                        <p class="text-[9px] text-blue-400 font-black mb-3 uppercase italic">محفظة الاستقبال (Vodafone Cash)</p>
                        <input type="text" id="payNumber" placeholder="رقم المحفظة" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl text-xs outline-none text-white text-center font-bold mb-2">
                        <button onclick="updatePaymentInfo()" class="w-full bg-blue-600/20 text-blue-400 py-2 rounded-xl text-[10px] font-black">حفظ الرقم</button>
                    </div>

                    <button onclick="toggleSettings()" class="w-full py-3 glass rounded-2xl text-[10px] font-black hover:bg-white/10 transition-all border border-white/5">إعدادات الحساب</button>
                </div>

                <!-- إحصائيات المسوق -->
                <div id="marketerStatsBox" class="hidden grid grid-cols-2 gap-4">
                    <div class="glass p-6 rounded-3xl text-center border border-white/5">
                        <p class="text-[9px] text-gray-500 uppercase font-black mb-1">المبيعات</p>
                        <p id="successOrdersCount" class="text-2xl font-black text-green-500">0</p>
                    </div>
                    <div class="glass p-6 rounded-3xl text-center border border-white/5">
                        <p class="text-[9px] text-gray-500 uppercase font-black mb-1">منتجاتي</p>
                        <p id="prodCount" class="text-2xl font-black text-blue-500">0</p>
                    </div>
                </div>
            </div>

            <!-- Content Area -->
            <div class="lg:col-span-2 space-y-10">
                
                <!-- إعدادات الحساب (مخفية) -->
                <div id="settingsPanel" class="glass p-8 rounded-[40px] border border-blue-500/20 hidden">
                    <h3 class="text-xl font-black mb-6 text-blue-400 italic">تحديث البيانات</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <input type="text" id="newName" placeholder="الاسم الجديد" class="bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-xs text-white">
                        <input type="text" id="newImg" placeholder="رابط صورة الحساب" class="bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-xs text-white">
                    </div>
                    <button onclick="updateProfile()" class="bg-blue-600 text-white px-10 py-3 rounded-2xl font-black text-xs">حفظ</button>
                </div>

                <!-- خاص بالمسوقين والأدمن: الطلبات الواردة -->
                <section id="marketerOrdersSection" class="hidden">
                    <h2 class="text-2xl font-black mb-6 flex items-center gap-3 italic text-yellow-500">
                        <span class="w-2 h-6 bg-yellow-500 rounded-full shadow-[0_0_10px_#eab308]"></span>
                        إدارة الطلبات الواردة
                    </h2>
                    <div id="incomingOrdersList" class="space-y-4"></div>
                </section>

                <!-- خاص بالعملاء: تتبع طلباتي -->
                <section id="customerOrdersSection">
                    <h2 class="text-2xl font-black mb-6 flex items-center gap-3 italic text-blue-400">
                        <span class="w-2 h-6 bg-blue-500 rounded-full shadow-[0_0_10px_#3b82f6]"></span>
                        تتبع طلباتي (Orders History)
                    </h2>
                    <div id="myOrdersList" class="space-y-4"></div>
                </section>

                <!-- المفضلات (كما في كودك) -->
                <section id="wishlistSection">
                    <h2 class="text-2xl font-black mb-6 flex items-center gap-3 italic text-pink-500">
                        <span class="w-2 h-6 bg-pink-500 rounded-full shadow-[0_0_10px_#ec4899]"></span>
                        قائمة المفضلات ❤
                    </h2>
                    <div id="wishlistGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
                </section>

                <!-- سجل المبيعات المؤرشف -->
                <section id="archiveSection" class="hidden">
                    <h2 class="text-2xl font-black mb-6 text-gray-500 italic">الأرشيف</h2>
                    <div id="archiveOrdersList" class="space-y-4"></div>
                </section>
            </div>
        </div>
    </div>

    <!-- Modal عرض الإيصال (كما في كودك) -->
    <div id="receiptModal" class="fixed inset-0 bg-black/90 z-[200] flex items-center justify-center hidden p-6">
        <div class="glass max-w-lg w-full p-8 rounded-[40px] text-center relative border border-white/10">
            <button onclick="closeReceipt()" class="absolute top-6 left-6 text-gray-500 hover:text-white">✕</button>
            <h3 class="text-xl font-black mb-6 text-blue-400 underline">إثبات الدفع</h3>
            <div id="receiptContent" class="text-white text-sm break-words bg-white/5 p-6 rounded-2xl border border-white/5 mb-6 font-mono"></div>
            <button onclick="closeReceipt()" class="bg-white text-black px-10 py-3 rounded-2xl font-bold">إغلاق</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, get, set, update, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCyypXt8LnHiVBR2Ka0Mb8ntXu6dJH9N-w", authDomain: "start-online-6f460.firebaseapp.com", projectId: "start-online-6f460", databaseURL: "https://start-online-6f460-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getDatabase(app);

        let myUid = null;
        let myRole = 'customer';

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                myUid = user.uid;
                const snap = await get(ref(db, 'users/' + myUid));
                if (snap.exists()) {
                    const u = snap.val();
                    myRole = u.role;
                    document.getElementById('userName').innerText = u.name;
                    document.getElementById('userEmail').innerText = u.email;
                    document.getElementById('userRoleBadge').innerText = u.role.toUpperCase();
                    document.getElementById('userImg').src = u.photo || `https://ui-avatars.com/api/?name=${u.name}&background=3b82f6&color=fff`;
                    
                    if(u.role === 'marketer' || u.role === 'admin') {
                        document.getElementById('marketerStatsBox').classList.remove('hidden');
                        document.getElementById('marketerSettings').classList.remove('hidden');
                        document.getElementById('marketerOrdersSection').classList.remove('hidden');
                        document.getElementById('archiveSection').classList.remove('hidden');
                        if(u.payNumber) document.getElementById('payNumber').value = u.payNumber;
                    }
                    loadAllOrders();
                    loadWishlist(u.wishlist || []);
                    loadProductCount();
                }
            } else { window.location.href = "login.html"; }
        });

        // تحميل كل الطلبات وفلترتها (واردة للمسوق / تتبع للعميل)
        function loadAllOrders() {
            onValue(ref(db, 'orders'), (snap) => {
                const orders = snap.val() || {};
                const incomingList = document.getElementById('incomingOrdersList');
                const myOrdersList = document.getElementById('myOrdersList');
                const archiveList = document.getElementById('archiveOrdersList');
                
                incomingList.innerHTML = ''; myOrdersList.innerHTML = ''; archiveList.innerHTML = '';
                let successCount = 0;

                Object.keys(orders).reverse().forEach(key => {
                    const o = orders[key];
                    const statusClass = `status-${o.status}`;
                    const orderHtml = `
                        <div class="glass p-6 rounded-3xl border border-white/5 flex flex-col md:flex-row justify-between gap-4 animate-fade-in shadow-xl">
                            <div class="flex gap-4 items-center">
                                <div class="text-right">
                                    <h4 class="font-black text-blue-400 text-sm uppercase">${o.productName}</h4>
                                    <p class="text-[9px] text-gray-500 italic mt-1">${o.date}</p>
                                    <div class="mt-2"><span class="status-badge ${statusClass}">${o.status}</span></div>
                                </div>
                            </div>
                            <div class="flex flex-col justify-center text-[10px] text-gray-400 gap-1 text-right">
                                <p>العميل: ${o.customerName}</p>
                                <p>الهاتف: ${o.phone1}</p>
                                <button onclick="viewReceipt('${o.receipt}')" class="text-blue-500 underline text-right">فتح إيصال الدفع</button>
                            </div>
                            <!-- أزرار التحكم (للمسوق فقط) -->
                            ${(myRole === 'admin' || o.marketerId === myUid) && (o.status === 'pending' || o.status === 'shipping') ? `
                                <div class="flex items-center gap-2">
                                    ${o.status === 'pending' ? `<button onclick="updateStatus('${key}', 'shipping')" class="bg-blue-600 text-white px-3 py-2 rounded-xl text-[9px] font-black">شحن</button>` : ''}
                                    <button onclick="updateStatus('${key}', 'completed')" class="bg-green-600 text-white px-3 py-2 rounded-xl text-[9px] font-black">تم</button>
                                    <button onclick="updateStatus('${key}', 'failed')" class="bg-red-600 text-white px-3 py-2 rounded-xl text-[9px] font-black">فشل</button>
                                </div>
                            ` : ''}
                        </div>
                    `;

                    // 1. لو أنا العميل اللي اشتريت
                    if(o.customerUid === myUid) {
                        myOrdersList.innerHTML += orderHtml;
                    }
                    
                    // 2. لو أنا المسوق اللي بيجيله الأوردرات
                    if(myRole === 'admin' || o.marketerId === myUid) {
                        if(o.status === 'pending' || o.status === 'shipping') {
                            incomingList.innerHTML += orderHtml;
                        } else {
                            archiveList.innerHTML += orderHtml;
                        }
                        if(o.status === 'completed') successCount++;
                    }
                });

                if(document.getElementById('successOrdersCount')) document.getElementById('successOrdersCount').innerText = successCount;
                if(!myOrdersList.innerHTML) myOrdersList.innerHTML = '<p class="text-gray-600 text-xs italic">لا توجد طلبات سابقة لك.</p>';
            });
        }

        window.updateStatus = async (id, status) => {
            await update(ref(db, 'orders/' + id), { status: status });
            alert("تم تحديث الحالة!");
        };

        function loadWishlist(wishlist) {
            onValue(ref(db, 'products'), (snap) => {
                const prods = snap.val() || {};
                const grid = document.getElementById('wishlistGrid'); grid.innerHTML = '';
                Object.keys(prods).forEach(key => {
                    if(wishlist.includes(key)) {
                        const p = prods[key];
                        grid.innerHTML += `<div class="glass p-4 rounded-3xl border border-white/5 flex gap-4 items-center">
                            <img src="${p.image}" class="w-12 h-12 rounded-xl object-cover">
                            <div class="flex-1"><h4 class="text-xs font-bold">${p.name}</h4><p class="text-blue-400 font-black text-xs">$${p.price}</p></div>
                            <a href="details.html?id=${key}&name=${p.name}&price=${p.price}&image=${p.image}" class="text-[9px] bg-blue-600 px-3 py-1.5 rounded-lg font-black">عرض</a>
                        </div>`;
                    }
                });
            });
        }

        async function loadProductCount() {
            const snap = await get(ref(db, 'products'));
            if(snap.exists()) {
                const count = Object.values(snap.val()).filter(p => p.owner === myUid).length;
                if(document.getElementById('prodCount')) document.getElementById('prodCount').innerText = count;
            }
        }

        window.updateProfile = async () => {
            const updates = {};
            if(document.getElementById('newName').value) updates.name = document.getElementById('newName').value;
            if(document.getElementById('newImg').value) updates.photo = document.getElementById('newImg').value;
            await update(ref(db, 'users/' + myUid), updates);
            location.reload();
        };

        window.updatePaymentInfo = async () => {
            await update(ref(db, 'users/' + myUid), { payNumber: document.getElementById('payNumber').value });
            alert("تم الحفظ!");
        };

        window.viewReceipt = (v) => { document.getElementById('receiptContent').innerText = v; document.getElementById('receiptModal').classList.remove('hidden'); };
        window.closeReceipt = () => document.getElementById('receiptModal').classList.add('hidden');
        window.toggleSettings = () => document.getElementById('settingsPanel').classList.toggle('hidden');
        window.logout = () => signOut(auth).then(() => window.location.href = "login.html");
    </script>
</body>
</html>
