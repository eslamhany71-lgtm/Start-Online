<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script src="translations.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8"><title>لوحة التحكم الاحترافية | Start Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); color: #f1f5f9; font-family: 'Cairo', sans-serif; min-height: 100vh; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .animate-slide { animation: slideIn 0.5s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .stat-box { background: rgba(59, 130, 246, 0.05); border: 1px solid rgba(59, 130, 246, 0.1); cursor: pointer; transition: 0.3s; }
        .stat-box:hover { background: rgba(59, 130, 246, 0.15); transform: translateY(-5px); border-color: rgba(59, 130, 246, 0.4); }
        .status-pending { color: #eab308; background: rgba(234, 179, 8, 0.1); }
        .status-completed { color: #22c55e; background: rgba(34, 197, 94, 0.1); }
        .status-failed { color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        .status-badge { padding: 2px 8px; border-radius: 10px; font-size: 9px; font-weight: 900; text-transform: uppercase; }
    </style>
</head>
<body class="pb-20">

<nav class="fixed top-0 left-0 right-0 z-50 p-2 md:p-6">
    <div class="max-w-7xl mx-auto glass rounded-xl md:rounded-2xl px-4 py-3 flex justify-between items-center shadow-2xl">
        <div class="text-lg md:text-2xl font-black text-white"><a href="index.html">START<span class="text-blue-400">ONLINE</span></a></div>
        <ul class="hidden md:flex gap-8 font-bold text-sm text-gray-300">
            <li><a href="index.html" class="hover:text-white transition">الرئيسية</a></li>
            <li><a href="products.html" class="hover:text-white transition">المتجر</a></li>
            <li><a href="profile.html" class="text-blue-400 font-bold">حسابي</a></li>
        </ul>
        <div class="flex gap-2">
            <a href="login.html" id="navBtn" class="bg-blue-600 text-white px-4 md:px-8 py-2 rounded-lg md:rounded-xl text-[10px] md:text-xs font-black transition-all">ابدأ الآن</a>
        </div>
    </div>
</nav>

<div class="pt-32 px-6 max-w-7xl mx-auto">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
        
        <div class="lg:col-span-1 space-y-6">
            <div id="mainSidebar" class="glass p-8 rounded-[40px] text-center border border-white/5 relative overflow-hidden shadow-2xl">
                <div id="userRoleBadge" class="absolute top-4 left-4 text-[8px] font-black bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full uppercase italic">Guest</div>
                <img id="userImg" src="https://via.placeholder.com/150" class="w-24 h-24 rounded-full mx-auto mb-4 object-cover border-4 border-blue-500/20 shadow-xl">
                <h1 id="userName" class="text-2xl font-black mb-1 italic">تحميل...</h1>
                <p id="userEmail" class="text-gray-500 text-[10px] mb-6">email@example.com</p>
                
                <div id="marketerSettings" class="hidden border-t border-white/5 pt-6 mt-4 mb-6">
                    <p class="text-[9px] text-blue-400 font-black mb-3 uppercase italic text-right">رقم استقبال الدفع</p>
                    <input type="text" id="payNumber" placeholder="رقم كاش / انستا باي" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl text-xs outline-none focus:border-blue-500 mb-2 text-white text-center font-bold">
                    <button onclick="updatePaymentInfo()" class="w-full bg-blue-600/20 text-blue-400 py-2 rounded-xl text-[10px] font-black">حفظ المحفظة</button>
                </div>

                <div id="walletBox" class="hidden bg-white/5 p-4 rounded-3xl border border-white/5 mb-6 text-right">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[9px] text-gray-500 font-black uppercase">أرباحي الكلية</span>
                        <span id="walletBalance" class="text-lg font-black text-white">0 ج.م</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-[9px] text-red-500 font-black uppercase">مديونية المنصة</span>
                        <span id="walletDebt" class="text-lg font-black text-red-500">0 ج.م</span>
                    </div>
                </div>

                <div id="privateActions" class="space-y-3">
                    <button onclick="toggleSettings()" class="w-full py-3 glass rounded-2xl text-[10px] font-black hover:bg-white/10 transition-all border border-white/5">إعدادات الحساب</button>
                    <button onclick="logout()" class="w-full py-3 bg-red-500/10 text-red-500 rounded-2xl text-[10px] font-black hover:bg-red-500 hover:text-white transition-all">خروج</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-2 space-y-12">
            
            <section id="insightsDashboard" class="hidden animate-slide">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="stat-box p-6 rounded-[30px] border-green-500/10 text-right">
                        <p class="text-[9px] text-gray-500 font-bold uppercase mb-2">صافي المبيعات</p>
                        <h3 id="totalRevenue" class="text-2xl font-black text-green-400">0 ج.م</h3>
                    </div>
                    <div onclick="openOrderArchive('completed')" class="stat-box p-6 rounded-[30px] border-blue-500/20 text-right">
                        <p class="text-[9px] text-blue-400 font-bold uppercase mb-2">طلبات تم تسليمها</p>
                        <h3 id="successOrdersCount" class="text-2xl font-black text-blue-400">0</h3>
                    </div>
                    <div onclick="openOrderArchive('failed')" class="stat-box p-6 rounded-[30px] border-red-500/20 text-right">
                        <p class="text-[9px] text-red-400 font-bold uppercase mb-2">طلبات ملغاة</p>
                        <h3 id="failedOrdersCount" class="text-2xl font-black text-red-400">0</h3>
                    </div>
                </div>
            </section>

            <section id="myPurchaseSection" class="animate-slide">
                <h2 class="text-2xl font-black mb-6 flex items-center gap-3 italic text-blue-400">
                    <span class="w-2 h-6 bg-blue-500 rounded-full"></span>
                    تتبع مشترياتي
                </h2>
                <div id="myPurchasesList" class="space-y-4"></div>
            </section>

            <section id="orderArchiveSection" class="hidden glass p-8 rounded-[40px] border border-white/10 animate-slide">
                <div class="flex justify-between items-center mb-6">
                    <h3 id="archiveTitle" class="text-xl font-black italic text-white">سجل المبيعات المؤرشفة</h3>
                    <button onclick="document.getElementById('orderArchiveSection').classList.add('hidden')" class="text-[10px] text-gray-500">إغلاق</button>
                </div>
                <div id="archiveList" class="space-y-4"></div>
            </section>

            <section id="ordersSection" class="hidden">
                <h2 class="text-2xl font-black mb-6 flex items-center gap-3 italic text-yellow-500">
                    <span class="w-2 h-6 bg-yellow-500 rounded-full"></span>
                    طلبات قيد المراجعة
                </h2>
                <div id="ordersList" class="space-y-4"></div>
            </section>
        </div>
    </div>
</div>

<div id="receiptModal" class="fixed inset-0 bg-black/90 z-[200] flex items-center justify-center hidden p-6">
    <div class="glass max-w-lg w-full p-8 rounded-[40px] text-center relative">
        <button onclick="closeReceipt()" class="absolute top-6 left-6 text-gray-500">✕</button>
        <h3 class="text-xl font-black mb-6 text-blue-400">بيانات التحويل / الإيصال</h3>
        <div id="receiptContent" class="text-white text-sm bg-white/5 p-6 rounded-2xl mb-6 font-mono break-all"></div>
    </div>
</div>
<div id="toast" class="fixed bottom-10 right-10 glass px-8 py-4 rounded-2xl text-white font-black opacity-0 transition-all pointer-events-none z-[100] border-blue-500/50 border text-[10px]"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, get, set, update, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyCyypXt8LnHiVBR2Ka0Mb8ntXu6dJH9N-w", authDomain: "start-online-6f460.firebaseapp.com", projectId: "start-online-6f460", databaseURL: "https://start-online-6f460-default-rtdb.firebaseio.com/" };
    const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getDatabase(app);

    let myUid = null; let myRole = 'customer'; let currentOrdersData = {};

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            myUid = user.uid;
            const snap = await get(ref(db, 'users/' + myUid));
            if (snap.exists()) {
                const u = snap.val();
                myRole = u.role;
                document.getElementById('userName').innerText = u.name;
                document.getElementById('userEmail').innerText = u.email;
                document.getElementById('userRoleBadge').innerText = u.role.toUpperCase();
                document.getElementById('userImg').src = u.photo || `https://ui-avatars.com/api/?name=${u.name}&background=3b82f6&color=fff`;
                
                if(u.role === 'marketer' || u.role === 'admin') {
                    document.querySelectorAll('#marketerSettings, #ordersSection, #insightsDashboard, #walletBox').forEach(el => el.classList.remove('hidden'));
                    if(u.payNumber) document.getElementById('payNumber').value = u.payNumber;
                    
                    // تحديث بيانات المحفظة
                    onValue(ref(db, `users/${myUid}/wallet`), (s) => {
                        const w = s.val() || { balance: 0, debt: 0 };
                        document.getElementById('walletBalance').innerText = (w.balance || 0) + " ج.م";
                        document.getElementById('walletDebt').innerText = (w.debt || 0) + " ج.م";
                    });
                }
                loadOrders(u.role);
            }
        } else { window.location.href = "login.html"; }
    });

    // دالة تحديث حالة الطلب مع المحرك المالي
    window.updateOrderStatus = async (orderId, status, amount) => {
        const orderRef = ref(db, 'orders/' + orderId);
        
        if(status === 'completed') {
            const commission = amount * 0.10; // نسبتك 10%
            const walletRef = ref(db, `users/${myUid}/wallet`);
            
            const wSnap = await get(walletRef);
            const w = wSnap.exists() ? wSnap.val() : { balance: 0, debt: 0 };

            await update(walletRef, {
                balance: (w.balance || 0) + amount,
                debt: (w.debt || 0) + commission
            });

            await push(ref(db, 'transactions/' + myUid), {
                title: "عمولة أوردر مكتمل",
                amount: commission,
                type: 'debt',
                date: new Date().toLocaleString('ar-EG')
            });
        }

        await update(orderRef, { status: status });
        showToast("تم تحديث الحالة بنجاح");
    };

    function loadOrders(role) {
        onValue(ref(db, 'orders'), (snap) => {
            currentOrdersData = snap.val() || {};
            const incomingList = document.getElementById('ordersList');
            const myPurchaseList = document.getElementById('myPurchasesList');
            incomingList.innerHTML = ''; myPurchaseList.innerHTML = '';
            
            let revenue = 0, success = 0, failed = 0;

            Object.keys(currentOrdersData).reverse().forEach(key => {
                const o = currentOrdersData[key];
                
                // للمشتري
                if(o.customerUid === myUid) {
                    myPurchaseList.innerHTML += `
                        <div class="glass p-5 rounded-2xl flex justify-between items-center text-right border border-white/5">
                            <div><h4 class="text-[10px] font-black text-blue-400 uppercase">${o.productName}</h4><p class="text-[8px] text-gray-500 mt-1">${o.date}</p></div>
                            <span class="status-badge status-${o.status || 'pending'}">${o.status || 'pending'}</span>
                        </div>`;
                }

                // للمسوق
                if(role === 'admin' || o.marketerId === myUid) {
                    if(o.status === 'completed') { revenue += o.totalPrice; success++; }
                    else if(o.status === 'failed') { failed++; }

                    if(!o.status || o.status === 'pending') {
                        incomingList.innerHTML += `
                            <div class="glass p-6 rounded-3xl border border-white/10 space-y-4 animate-slide text-right">
                                <div class="flex justify-between items-start border-b border-white/5 pb-4">
                                    <div>
                                        <h4 class="font-black text-blue-400">${o.productName}</h4>
                                        <p class="text-[10px] text-white">العميل: ${o.customerName}</p>
                                        <p class="text-[9px] text-gray-400 mt-1">طريقة الدفع: <span class="text-yellow-500 font-bold">${o.payMethod || 'غير محدد'}</span></p>
                                    </div>
                                    <div class="flex gap-2">
                                        <button onclick="updateOrderStatus('${key}', 'completed', ${o.totalPrice})" class="bg-green-600 text-white px-3 py-1 rounded-lg text-[9px] font-black">تم الاستلام</button>
                                        <button onclick="updateOrderStatus('${key}', 'failed', 0)" class="bg-red-600 text-white px-3 py-1 rounded-lg text-[9px] font-black">إلغاء</button>
                                    </div>
                                </div>
                                <div class="text-[10px] text-gray-400">
                                    <p>📍 العنوان: ${o.address}</p>
                                    <p>📞 موبايل: ${o.phone} | <button onclick="viewReceipt('${o.receipt}')" class="text-blue-400 underline uppercase">إثبات الدفع</button></p>
                                    <p class="text-white font-bold mt-2 font-mono text-sm">المبلغ المطلوب: ${o.totalPrice} ج.م</p>
                                </div>
                            </div>`;
                    }
                }
            });
            document.getElementById('totalRevenue').innerText = revenue + " ج.م";
            document.getElementById('successOrdersCount').innerText = success;
            document.getElementById('failedOrdersCount').innerText = failed;
        });
    }

    window.openOrderArchive = (status) => {
        const sect = document.getElementById('orderArchiveSection');
        const list = document.getElementById('archiveList');
        sect.classList.remove('hidden'); list.innerHTML = '';
        Object.keys(currentOrdersData).forEach(key => {
            const o = currentOrdersData[key];
            if(o.status === status && (myRole === 'admin' || o.marketerId === myUid)) {
                list.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl flex justify-between items-center text-[10px]"><div class="text-right"><p class="text-blue-400 font-black uppercase">${o.productName}</p><p class="text-gray-500 italic mt-1">${o.customerName}</p></div><span class="font-bold">${o.totalPrice} ج.م</span></div>`;
            }
        });
    };

    window.updatePaymentInfo = async () => { await update(ref(db, 'users/' + myUid), { payNumber: document.getElementById('payNumber').value }); showToast("تم حفظ المحفظة!"); };
    window.viewReceipt = (v) => { if(v.startsWith('http')) window.open(v, '_blank'); else { document.getElementById('receiptContent').innerText = v; document.getElementById('receiptModal').classList.remove('hidden'); } };
    window.closeReceipt = () => document.getElementById('receiptModal').classList.add('hidden');
    window.toggleSettings = () => document.getElementById('settingsPanel').classList.toggle('hidden');
    window.showToast = (m) => { const t = document.getElementById('toast'); t.innerText = m; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 3000); };
    window.logout = () => signOut(auth).then(() => window.location.href = "login.html");
</script>
</body>
</html>
